<style>
:root{
  --ink:#0B0E14; --surface:#10141C; --sunk:#0D1117;
  --line:#212938; --line-soft:#181E29;
  --text:#E6E9F0; --muted:#8A93A6; --faint:#5C6478;
  --violet:#A78BFA;
  --pearl:#CBD5F5; --ember:#FF4D5E; --aqua:#35C9E8; --leaf:#6FD97C;

  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  --col:min(680px,100% - 2.2rem);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--ink);color:var(--text);font-family:var(--sans);
  font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;
  min-height:100vh;min-height:100dvh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 40rem at 50% -12rem,rgba(167,139,250,.10),transparent 70%);
}
.eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}

/* ── chrome ─────────────────────────────── */
.topbar{
  position:relative;z-index:2;display:flex;align-items:center;gap:1rem;
  padding:.8rem max(1.1rem,calc((100% - 680px)/2));
  border-bottom:1px solid var(--line-soft);
}
.home{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;white-space:nowrap}
.home:hover{color:var(--violet)}
.home::before{content:'\2190 '}
.mark{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--faint);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.langs{display:flex;gap:.3rem}
.langs button{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;background:none;
  border:1px solid var(--line);color:var(--muted);padding:.28rem .5rem;border-radius:2px;cursor:pointer}
.langs button:hover{color:var(--text);border-color:var(--violet)}
.langs button[aria-current="true"]{color:var(--ink);background:var(--violet);border-color:var(--violet);font-weight:700}
.ver{font-family:var(--mono);font-size:.56rem;color:var(--faint)}

/* ── slides: one view at a time, never a scroll jump ── */
main{position:relative;z-index:1}
.view{display:none;width:var(--col);margin-inline:auto;padding-block:2.4rem 4rem}
.view.on{display:block;animation:in .28s ease}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,7vw,3rem);
  line-height:1.05;letter-spacing:-.02em;margin-block:.6rem 1rem}
h2{font-family:var(--serif);font-weight:400;font-size:1.5rem;margin-block:.4rem .8rem}
p{color:#C3CAD9;margin-block:.7rem}
.lede{color:var(--muted)}

.btn{
  display:inline-block;font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;
  text-transform:uppercase;padding:.85rem 1.6rem;border-radius:2px;cursor:pointer;
  background:var(--violet);color:var(--ink);border:1px solid var(--violet);font-weight:700;
}
.btn:hover{opacity:.88}
.btn.ghost{background:none;color:var(--muted);border-color:var(--line);font-weight:400}
.btn.ghost:hover{color:var(--text);border-color:var(--violet);opacity:1}
.btns{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:2rem}

.note{margin-top:1.6rem;padding:1rem 1.1rem;background:var(--sunk);

.note b{color:var(--text)}
.method{border-left:2px solid var(--violet);padding-left:1.1rem;margin-top:1.6rem}
.method dt{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--violet);margin-top:1rem}
.method dd{font-size:.9rem;color:var(--muted);margin-top:.15rem}

/* ── question ───────────────────────────── */
.prog{display:flex;align-items:center;gap:.9rem;margin-bottom:2.2rem}
.prog-bar{flex:1;height:2px;background:var(--line);overflow:hidden}
.prog-bar i{display:block;height:100%;background:var(--violet);transition:width .3s ease}
.prog-n{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;color:var(--faint);white-space:nowrap}
.frame{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;

.opts{display:grid;gap:.5rem}
.opt{
  display:flex;align-items:center;gap:.9rem;width:100%;text-align:left;cursor:pointer;

.opt:hover{border-color:var(--violet)}

.power:first-of-type{border-top:0}
.p-top{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap}
.p-name{font-family:var(--serif);font-size:1.35rem;letter-spacing:.13em;text-transform:uppercase;color:var(--c)}
.p-el{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}

.bars{margin:.9rem 0 .8rem}
.bar{display:flex;align-items:center;gap:.8rem;margin-top:.35rem}

.bar u i{display:block;height:100%;background:var(--c);border-radius:99px;transition:width .6s ease}
.bar u.sh i{background:repeating-linear-gradient(90deg,var(--c) 0 3px,transparent 3px 6px)}
.bar em{font-family:var(--mono);font-size:.6rem;color:var(--muted);font-style:normal;width:2.2rem;text-align:right;flex:none}
.p-read{font-size:.93rem;color:#C3CAD9;line-height:1.6}

.verdict{background:var(--sunk);border:1px solid var(--line-soft);border-radius:3px;
  padding:1.2rem 1.2rem 1.3rem;margin-bottom:2rem}
.verdict h3{font-family:var(--serif);font-weight:400;font-size:1.2rem;margin-bottom:.4rem}
.verdict p{font-size:.92rem;margin-block:.5rem}
.axis{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;color:var(--faint);margin-top:.9rem}
.axis b{color:var(--violet);font-weight:400}

/* ── remedy ─────────────────────────────── */
.rx{border-left:2px solid var(--c);padding-left:1.3rem;margin-bottom:2.2rem}
.rx-h{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c)}
.rx h3{font-family:var(--serif);font-weight:400;font-size:1.3rem;margin:.3rem 0 .5rem}
.rx p{font-size:.95rem}
.rx ul{list-style:none;margin-top:.8rem;display:grid;gap:.45rem}
.rx li{padding-left:1rem;position:relative;font-size:.9rem;color:#C3CAD9}
.rx li::before{content:'';position:absolute;left:0;top:.62em;width:4px;height:4px;border-radius:50%;background:var(--c)}
.relief{color:var(--muted);font-size:.88rem;margin-top:1rem;padding-top:.9rem;border-top:1px solid var(--line-soft)}
.flower{color:var(--muted);font-size:.88rem;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--line-soft)}

/* ── practitioner ───────────────────────── */
.flag{border:1px solid var(--ember);background:rgba(255,77,94,.07);border-radius:3px;
  padding:1rem 1.1rem;margin-bottom:1rem}
.flag-h{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ember)}
.flag p{font-size:.9rem;margin-top:.4rem}
.flag q{color:#EDEFF5;font-family:var(--serif);font-style:italic}
.clean{border:1px solid var(--leaf);background:rgba(111,217,124,.06);border-radius:3px;padding:1rem 1.1rem}
.clean .flag-h{color:var(--leaf)}
.raw{font-family:var(--mono);font-size:.72rem;color:var(--muted);background:var(--sunk);
  border:1px solid var(--line-soft);padding:1rem;border-radius:3px;margin-top:1.4rem;
  white-space:pre;overflow-x:auto}

@media(prefers-reduced-motion:reduce){.view.on{animation:none}*{transition-duration:.01ms !important}}
</style>
</head>

              Two scores per power, never one. Part 1 asks how you
              have always been; Part 2 asks about recent months.
              Most quizzes collapse these and end up measuring only
              this month's stress while claiming to read character.

   JUNG       The four functions sit in two pairs of opposites. The
              inferior function is always the opposite of the dominant,
              is where the shadow erupts, and arrives raw under stress.

   WU XING    The controlling cycle. You do not fight an excess; you
              strengthen its controller. Water extinguishes fire.

   The cards already encode the oppositions:
     Ishwari (air, "too much in the air") <-> Saraswati (earth, all body)
     Kali (fire, rage)                    <-> Lakshmi (water, forgiveness)
   So the remedy engine treats a power's shadow with its OPPOSITE's
   practices, and offers its own card only as symptomatic relief.
   ═══════════════════════════════════════════════════════════════════ */

  {id:'ishwari',   c:'--pearl', opp:'saraswati'},
  {id:'kali',      c:'--ember', opp:'lakshmi'},
  {id:'lakshmi',   c:'--aqua',  opp:'kali'},
  {id:'saraswati', c:'--leaf',  opp:'ishwari'}
];
const PI = {ishwari:0, kali:1, lakshmi:2, saraswati:3};

/* Items. n = nature (Prakriti), s = shadow (Vikriti).
   crit marks items that are surfaced to the practitioner regardless
   of the total, the way PHQ-9 handles item 9. They score normally. */
const ITEMS = [
  // ── nature ──
  {p:'ishwari',  d:'n', k:'i_n1'}, {p:'ishwari',  d:'n', k:'i_n2'},
  {p:'ishwari',  d:'n', k:'i_n3'}, {p:'ishwari',  d:'n', k:'i_n4'},

  {p:'kali',     d:'n', k:'k_n5'},

  {p:'lakshmi',  d:'n', k:'l_n3'}, {p:'lakshmi',  d:'n', k:'l_n4'},
  {p:'lakshmi',  d:'n', k:'l_n5'},

/* Interleave so no two consecutive items share a power. Fixed, not
   random, so a client's run is reproducible and Kerstin can compare
   two sittings item by item. Questions never reveal which power they
   belong to; a visible label would invite strategic answering. */
function order(dim){
  const byP = POWERS.map(p => ITEMS.filter(i => i.p===p.id && i.d===dim));
  const out = [];
  for (let r=0; r<5; r++) for (let c=0; c<4; c++) out.push(byP[(c+r)%4][r]);
  return out;
}

/* ═══════════════ engine ═══════════════ */
let LANG='en', ans={}, cur=0;
const $ = id => document.getElementById(id);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!==undefined)e.innerHTML=h; return e;};

function show(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));
  $('v-'+v).classList.add('on');
  window.scrollTo(0,0);            // instant. never a scroll jump.
}

function score(){
  const out={};
  POWERS.forEach(p=>{
    const g=d=>{
      const its=ITEMS.filter(i=>i.p===p.id&&i.d===d);
      const s=its.reduce((a,i)=>a+(ans[i.k]||0),0);
      return Math.round(s/(its.length*4)*100);
    };
    out[p.id]={nature:g('n'), shadow:g('s')};
  });
  return out;
}
function stateOf(s){
  const hiN=s.nature>=50, hiS=s.shadow>=50;
  return hiN ? (hiS?'distorted':'clear') : (hiS?'bleeding':'quiet');
}
function flatline(){
  const v=Object.values(ans);
  if(v.length<40) return false;
  return new Set(v).size<=1;
}
function crits(){
  return ITEMS.filter(i=>i.crit && (ans[i.k]||0)>=4);
}

/* ── intro ── */
function vIntro(){
  const t=T[LANG];
  $('v-intro').innerHTML='';
  const w=$('v-intro');
  w.appendChild(el('p','eyebrow',t.mark));
  w.appendChild(el('h1','',t.title));
  w.appendChild(el('p','lede',t.lede));
  const dl=el('dl','method');
  t.method.forEach(([h,b])=>{dl.appendChild(el('dt','',h)); dl.appendChild(el('dd','',b));});
  w.appendChild(dl);
  w.appendChild(el('p','note',t.introNote));
  const b=el('div','btns');
  const go=el('button','btn',t.begin);
  go.onclick=()=>{cur=0; vQ();};
  b.appendChild(go); w.appendChild(b);
}

/* ── question ── */
function vQ(){
  const t=T[LANG], it=SEQ[cur], w=$('v-q');
  w.innerHTML='';
  const pr=el('div','prog');
  pr.appendChild(el('span','prog-n',(cur+1)+' / 40'));
  const bar=el('div','prog-bar'); bar.appendChild(el('i')); 
  bar.firstChild.style.width=((cur)/40*100)+'%';
  pr.appendChild(bar);
  w.appendChild(pr);
  w.appendChild(el('p','frame', it.d==='n'?t.frameN:t.frameS));
  w.appendChild(el('p','qtext',Q[LANG][it.k]));
  const o=el('div','opts');
  t.scale.forEach((lab,v)=>{
    const b=el('button','opt');
    b.setAttribute('role','radio');
    b.setAttribute('aria-checked', String(ans[it.k]===v));
    b.appendChild(el('span'));
    b.appendChild(el('em','',lab)); b.lastChild.style.fontStyle='normal';
    b.onclick=()=>{ ans[it.k]=v; adv(); };
    o.appendChild(b);
  });
  w.appendChild(o);
  const nav=el('div','qnav');
  if(cur>0){
    const bk=el('button','btn ghost',t.back);
    bk.onclick=()=>{ cur--; vQ(); };
    nav.appendChild(bk);
  }
  w.appendChild(nav);
  show('q');
}
function adv(){
  if(cur===19){ vMid(); return; }
  if(cur===39){ vRes(); return; }
  cur++; vQ();
}

/* ── midpoint ── */
function vMid(){
  const t=T[LANG], w=$('v-mid'); w.innerHTML='';
  w.appendChild(el('p','eyebrow',t.mark));
  w.appendChild(el('h1','',t.midTitle));
  w.appendChild(el('p','lede',t.midLede));
  const b=el('div','btns');
  const go=el('button','btn',t.next);
  go.onclick=()=>{ cur=20; vQ(); };
  const bk=el('button','btn ghost',t.back);
  bk.onclick=()=>{ cur=19; vQ(); };
  b.appendChild(go); b.appendChild(bk); w.appendChild(b);
  show('mid');
}

/* ── results ── */
function vRes(){
  const t=T[LANG], s=score(), w=$('v-res'); w.innerHTML='';
  w.appendChild(el('p','eyebrow',t.mark));
  w.appendChild(el('h1','',t.resTitle));

  if(flatline()) w.appendChild(el('p','note',t.flat));

  const byNat=[...POWERS].sort((a,b)=>s[b.id].nature-s[a.id].nature);
  const byShd=[...POWERS].sort((a,b)=>s[b.id].shadow-s[a.id].shadow);
  const dom=byNat[0], inf=byNat[3], load=byShd[0];

  const v=el('div','verdict');
  v.appendChild(el('h3','',`${t.dominant} ${P[LANG][dom.id].n}`));
  v.appendChild(el('p','',`${t.inferior}: ${P[LANG][inf.id].n}. ${t.loaded}: ${P[LANG][load.id].n}.`));
  const jung = (dom.opp===inf.id);
  v.appendChild(el('p','',jung?t.axisJung:t.axisOff));
  v.appendChild(el('p','axis',`<b>${P[LANG][dom.id].n}</b> ${jung?'\u2194':'\u00b7'} <b>${P[LANG][inf.id].n}</b>`));
  w.appendChild(v);

  POWERS.forEach(p=>{
    const sc=s[p.id], st=stateOf(sc), d=P[LANG][p.id];
    const box=el('div','power'); box.style.setProperty('--c',`var(${p.c})`);
    const top=el('div','p-top');
    top.appendChild(el('span','p-name',d.n));
    top.appendChild(el('span','p-el',`${d.el} \u00b7 ${d.att}`));
    top.appendChild(el('span','p-state',t.states[st]));
    box.appendChild(top);
    const bars=el('div','bars');
    [['nature',t.natureL,''],['shadow',t.shadowL,'sh']].forEach(([k,lab,cls])=>{
      const b=el('div','bar');
      b.appendChild(el('b','',lab));
      const u=el('u',cls); u.appendChild(el('i'));
      u.firstChild.style.width=sc[k]+'%';
      b.appendChild(u);
      b.appendChild(el('em','',sc[k]));
      bars.appendChild(b);
    });
    box.appendChild(bars);
    box.appendChild(el('p','p-read',d[st]));
    w.appendChild(box);
  });

  const b=el('div','btns');
  const rx=el('button','btn',t.seeRx); rx.onclick=()=>vRx(s,load);
  const pc=el('button','btn ghost',t.seePrac); pc.onclick=()=>vPrac(s);
  const ag=el('button','btn ghost',t.again);
  ag.onclick=()=>{ ans={}; cur=0; vIntro(); show('intro'); };
  b.appendChild(rx); b.appendChild(pc); b.appendChild(ag);
  w.appendChild(b);
  show('res');
}

/* ── remedy: the opposite, not the same ── */
function vRx(s,load){
  const t=T[LANG], w=$('v-rx'); w.innerHTML='';
  w.appendChild(el('p','eyebrow',t.mark));
  w.appendChild(el('h1','',t.rxTitle));

  if(s[load.id].shadow<50){
    w.appendChild(el('p','lede',t.rxBalanced));
  } else {
    const r=RX[LANG][load.id], d=P[LANG][load.id];
    w.appendChild(el('p','lede',t.rxIntro.replace('{P}',d.n)));
    const box=el('div','rx');
    box.style.setProperty('--c',`var(${POWERS[PI[load.opp]].c})`);
    box.appendChild(el('p','rx-h',t.rxOpp));
    box.appendChild(el('h3','',`${d.n} \u2192 ${r.opp}`));
    box.appendChild(el('p','',r.lead));
    const ul=el('ul');
    r.do.forEach(x=>ul.appendChild(el('li','',x)));
    box.appendChild(ul);
    box.appendChild(el('p','relief',`<b style="color:var(--muted);font-weight:600">${t.rxOwn}.</b> ${r.relief}`));
    const fl=FLOWERS[LANG][load.opp];
    box.appendChild(el('p','flower',
      `<b style="color:var(${POWERS[PI[load.opp]].c});font-weight:600">${t.rxFlower}.</b> ${t.rxFlowerLead} <i style="font-style:italic;color:#EDEFF5">${fl.name}</i> <span style="font-family:var(--serif);font-style:italic;color:var(--muted)">(${fl.latin})</span>. ${fl.line}`));
    w.appendChild(box);
    w.appendChild(el('p','note',t.rxDefault));
  }

  const b=el('div','btns');
  const bk=el('button','btn ghost',t.backRes); bk.onclick=()=>show('res');
  b.appendChild(bk); w.appendChild(b);
  show('rx');
}

/* ── practitioner ── */
function vPrac(s){
  const t=T[LANG], w=$('v-prac'); w.innerHTML='';
  w.appendChild(el('p','eyebrow',t.mark));
  w.appendChild(el('h1','',t.pracTitle));
  w.appendChild(el('p','lede',t.pracLede));

  const c=crits();
  if(!c.length){
    const ok=el('div','clean');
    ok.appendChild(el('p','flag-h',t.pracClean.split('.')[0]));
    ok.appendChild(el('p','',t.pracClean));
    w.appendChild(ok);
  } else {
    w.appendChild(el('p','note',t.pracWhy));
    c.forEach(i=>{
      const [h,body]=t.crit[i.crit];
      const f=el('div','flag');
      f.appendChild(el('p','flag-h',h));
      f.appendChild(el('p','',`<q>${Q[LANG][i.k]}</q>`));
      f.appendChild(el('p','',body));
      w.appendChild(f);
    });
    w.appendChild(el('p','note',t.pracRefer));
  }

  let raw=t.raw+'\n\n';
  raw+='POWER        NATURE  LOAD  STATE\n';
  POWERS.forEach(p=>{
    const d=P[LANG][p.id], sc=s[p.id];
    raw+=(d.n+'            ').slice(0,13)
       + (sc.nature+'      ').slice(0,8)
       + (sc.shadow+'     ').slice(0,6)
       + t.states[stateOf(sc)]+'\n';
  });
  if(flatline()) raw+='\n!! flatline: identical answers throughout\n';
  w.appendChild(el('div','raw',raw));

  const b=el('div','btns');
  const bk=el('button','btn ghost',t.backRes); bk.onclick=()=>show('res');
  b.appendChild(bk); w.appendChild(b);
  show('prac');
}

/* ── language ── */
function setLang(l){
  LANG=l;
  document.documentElement.lang=l;
  document.title=T[l].mark;
  $('mark').textContent=T[l].mark;
  document.getElementById('homelink').textContent=T[l].homelink;
  document.querySelectorAll('.langs button').forEach(b=>
    b.setAttribute('aria-current',String(b.dataset.lang===l)));
  const on=document.querySelector('.view.on').id.slice(2);
  vIntro();
  if(on==='q') vQ();
  else if(on==='mid') vMid();
  else if(on==='res') vRes();
  else if(on==='rx'){ const s=score(); const l2=[...POWERS].sort((a,b)=>s[b.id].shadow-s[a.id].shadow)[0]; vRx(s,l2); }
  else if(on==='prac') vPrac(score());
  else show('intro');
}
document.querySelectorAll('.langs button').forEach(b=>
  b.addEventListener('click',()=>setLang(b.dataset.lang)));

setLang('en');
</script>
</body>
