<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Authors · The Four Powers</title>
<style>
:root{
  --ink:#0B0E14; --sunk:#0D1117; --line:#212938; --line-soft:#181E29;
  --text:#E6E9F0; --muted:#8A93A6; --faint:#5C6478; --violet:#A78BFA;
  --pearl:#CBD5F5; --ember:#FF4D5E; --aqua:#35C9E8; --leaf:#6FD97C;
  --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
  --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  --col:min(680px,100% - 2.2rem);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.68;
  -webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 40rem at 50% -12rem,rgba(167,139,250,.10),transparent 70%)}
main,.topbar{position:relative;z-index:1}
.eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}
.topbar{display:flex;align-items:center;gap:1rem;padding:.8rem max(1.1rem,calc((100% - 680px)/2));
  border-bottom:1px solid var(--line-soft)}
.home{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;white-space:nowrap}
.home:hover{color:var(--violet)}
.home::before{content:'\2190 '}
.mark{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--faint);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.langs{display:flex;gap:.3rem}
.langs button{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;background:none;
  border:1px solid var(--line);color:var(--muted);padding:.28rem .5rem;border-radius:2px;cursor:pointer}
.langs button:hover{color:var(--text);border-color:var(--violet)}
.langs button[aria-current="true"]{color:var(--ink);background:var(--violet);border-color:var(--violet);font-weight:700}
.ver{font-family:var(--mono);font-size:.56rem;color:var(--faint)}
.wrap{width:var(--col);margin-inline:auto;padding-block:2.6rem 4rem}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,7vw,3rem);line-height:1.05;margin-block:.6rem 1rem}
.lede{color:var(--muted);font-size:1.02rem}
h2{font-family:var(--serif);font-weight:400;font-size:1.5rem;margin-block:.4rem .7rem}
p{color:#C3CAD9;margin-block:.7rem}
.sec{margin-top:3rem;padding-top:2.2rem;border-top:1px solid var(--line-soft)}

.person{margin-top:2rem}
.person .role{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--violet)}
.offer{margin-top:1rem;display:flex;gap:.4rem;flex-wrap:wrap}
.offer span{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;color:var(--muted);
  border:1px solid var(--line);border-radius:99px;padding:.3rem .7rem}
.links{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
.links a{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;color:var(--text);border:1px solid var(--line);border-radius:2px;padding:.5rem .9rem}
.links a:hover{border-color:var(--violet);color:var(--violet)}

.yama{border-left:2px solid var(--violet);padding-left:1.2rem;margin-top:1.6rem}
.yama dt{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--violet);margin-top:1rem}
.yama dd{font-size:.92rem;color:var(--muted);margin-top:.1rem}

.season{margin-top:1.4rem;border:1px solid var(--line);border-radius:4px;background:var(--sunk);
  padding:1.3rem 1.4rem;border-left:3px solid var(--c)}
.s-top{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap}
.s-season{font-family:var(--serif);font-size:1.3rem;color:var(--c)}
.s-power{font-family:var(--mono);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--c);
  border:1px solid var(--c);border-radius:99px;padding:.14rem .55rem}
.s-place{margin-left:auto;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;color:var(--faint)}
.season p{font-size:.92rem;margin-top:.6rem}
.note{margin-top:2rem;padding:1rem 1.1rem;background:var(--sunk);border:1px solid var(--line-soft);
  border-radius:3px;font-size:.86rem;color:var(--muted)}
.note b{color:var(--text)}
</style>
</head>
<body>
<header class="topbar">
  <a class="home" id="home" href="index.html"></a>
  <div class="mark" id="mark"></div>
  <nav class="langs" aria-label="Language">
    <button data-lang="en" aria-current="true">EN</button>
    <button data-lang="de" aria-current="false">DE</button>
    <button data-lang="hr" aria-current="false">HR</button>
  </nav>
  <span class="ver">v5 (a)</span>
</header>
<main><div class="wrap" id="wrap"></div></main>

   ["Aparigraha · Nicht-Greifen","Warum die Lesung frei ist, die Blumen nichts kosten, und alles Käufliche klar auf der anderen Seite einer Linie sitzt."]

   "Na jeziku moći njegove su Kali i Ishwari, vatra izvedbe i zrak vizije, uzemljene kroz svakodnevni zanat Saraswati. Izgradio je ovaj okvir i njegovo očitanje, upletavši Sri Aurobinda sa starijim sustavima, onako kako je i sama integralna joga upletena."],
  m_offer:["DJ setovi","Filmska produkcija","Joga","Podučavanje ritma","Tajlandska masaža"],
  links:[],

  yogaH:"Zašto alat, a ne samo savjet",
  yogaP:["Ovo je zamišljeno da sjedi unutar joge, ne pokraj nje. Osam udova počinje s yamom i niyamom, suzdržajima i pridržavanjima, i oni ovdje nisu ukras. Oni su provjera koju je cjelina morala proći.",
   "Patanjalijevo četvrto pridržavanje je svadhyaya, samoproučavanje. Očitanje nije dodatak praksi. Ono je njezin ud. A peto, ishvara pranidhana, predaja, jest vlastiti treći uvjet Sri Aurobinda: svijest, plastičnost, bezrezervna predaja."],
  yama:[

   ["Asteya · neuzimanje","Zašto je svaki izvor imenovan i citiran, a ne upijen. Majčine riječi ostaju njezine, Sri Aurobindove njegove, a gdje se očitanje oslanja na ayurvedu ili Junga, to se kaže."],
   ["Aparigraha · negrabljenje","Zašto je očitanje slobodno, cvijeće ne košta ništa, a sve što se prodaje jasno stoji s druge strane crte."]

  lifeH:"Jedan život, posložen po četvero",

  seasons:[

 }

const $=id=>document.getElementById(id);
function render(l){
 const t=T[l];
 document.documentElement.lang=l;document.title=t.title+" · "+t.mark;
 $('home').textContent=t.home;$('mark').textContent=t.mark;
 let h=`<p class="eyebrow">${t.mark}</p><h1>${t.title}</h1><p class="lede">${t.lede}</p>`;
 h+=`<div class="sec"><div class="person"><div class="role">${t.m_role}</div>${t.m_bio.map(p=>`<p>${p}</p>`).join('')}
      <div class="offer">${t.m_offer.map(o=>`<span>${o}</span>`).join('')}</div>${
      t.links.length?`<div class="links">${t.links.map(([n,u])=>`<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join('')}</div>`:''}</div></div>`;
 h+=`<div class="sec"><h2>${t.yogaH}</h2>${t.yogaP.map(p=>`<p>${p}</p>`).join('')}
      <dl class="yama">${t.yama.map(([d,dd])=>`<dt>${d}</dt><dd>${dd}</dd>`).join('')}</dl></div>`;
 h+=`<div class="sec"><h2>${t.lifeH}</h2>${t.lifeP.map(p=>`<p>${p}</p>`).join('')}`;
 h+=t.seasons.map((s,i)=>
    `<div class="season" style="--c:var(${SEASON_C[i]})">
       <div class="s-top"><span class="s-season">${s.season}</span>
         <span class="s-power">${s.power}</span><span class="s-place">${s.place}</span></div>
       <p>${s.text}</p></div>`).join('');
 h+=`<p class="note">${t.note}</p></div>`;
 $('wrap').innerHTML=h;
 document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-current',String(b.dataset.lang===l)));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.lang)));
/* ── language persistence (first-party cookie, no banner needed) ── */
(function(){
  var KEY='fp_lang', VALID={en:1,de:1,hr:1};
  function read(){
    var m=document.cookie.match(/(?:^|; )fp_lang=([^;]*)/);
    var v=m?decodeURIComponent(m[1]):null; return VALID[v]?v:null;
  }
  function write(l){
    var d=new Date(); d.setTime(d.getTime()+31536000000); // 1 year
    document.cookie=KEY+'='+l+'; expires='+d.toUTCString()+'; path=/; SameSite=Lax';
  }
  var _apply=render;
  render=function(l){ if(VALID[l]) write(l); return _apply(l); };
  render(read()||'en');
})();
</script>
