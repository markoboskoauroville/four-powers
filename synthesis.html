<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Four Powers of the Mother</title>
<style>
:root{
  --ink:#0B0E14;
  --surface:#10141C;
  --sunk:#0D1117;
  --line:#212938;
  --line-soft:#181E29;
  --text:#E6E9F0;
  --muted:#8A93A6;
  --faint:#5C6478;
  --violet:#A78BFA;

  --pearl:#CBD5F5;
  --ember:#FF4D5E;
  --aqua:#35C9E8;
  --leaf:#6FD97C;

  --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
  --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;

  --col:min(760px,100% - 2.5rem);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--text);
  font-family:var(--sans);
  font-size:17px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 40rem at 50% -10rem, rgba(167,139,250,.10), transparent 70%);
}
main,.topbar{position:relative;z-index:1}

/* ── top bar ─────────────────────────────── */
.topbar{
  display:flex;align-items:center;gap:1rem;
  padding:.85rem max(1.25rem,calc((100% - 760px)/2));
  border-bottom:1px solid var(--line-soft);
}
.home{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;white-space:nowrap}
.home:hover{color:var(--violet)}
.home::before{content:'\2190 '}
.mark{
  font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--faint);flex:1;text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.langs{display:flex;gap:.3rem}
.langs button{
  font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;
  background:none;border:1px solid var(--line);color:var(--muted);
  padding:.3rem .55rem;border-radius:2px;cursor:pointer;
}
.langs button:hover{color:var(--text);border-color:var(--violet)}
.langs button[aria-current="true"]{
  color:var(--ink);background:var(--violet);border-color:var(--violet);font-weight:700;
}
.ver{font-family:var(--mono);font-size:.58rem;color:var(--faint);letter-spacing:.05em}

/* ── shared ──────────────────────────────── */
.wrap{width:var(--col);margin-inline:auto}
.eyebrow{
  font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--faint);
}
.prose p{color:#C3CAD9;margin-block:.75rem}
.prose h3{
  font-family:var(--serif);font-size:1.12rem;font-weight:400;
  color:var(--text);margin-block:1.6rem .1rem;letter-spacing:.01em;
}
.prose h3:first-child{margin-top:0}

/* ── hero ────────────────────────────────── */
.hero{width:var(--col);margin:3.5rem auto 0;text-align:center}
.hero h1{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(2.35rem,8.5vw,4.3rem);line-height:1.0;
  letter-spacing:-.02em;margin-block:.7rem .9rem;
}
.hero h1 em{font-style:normal;color:var(--violet)}
.lede{
  color:var(--muted);max-width:34rem;margin-inline:auto;
  font-size:1.02rem;
}
.attrs{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--muted);margin-top:2.2rem;
}
.attrs::before,.attrs::after{content:'';display:block;height:1px;width:3rem;
  background:var(--line);margin:1.1rem auto}

/* ── symbol ──────────────────────────────── */
.coda{
  width:var(--col);margin:3.5rem auto 0;padding-top:3rem;
  text-align:center;position:relative;border-top:1px solid var(--line-soft);
}
.coda::before{
  content:'';position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);
  width:min(440px,92vw);height:23rem;pointer-events:none;
  background:radial-gradient(circle at 50% 45%,rgba(167,139,250,.10),transparent 68%);
}
.coda > *{position:relative}
.coda .sign{margin-top:2.2rem}
.symbol{margin:0 auto;max-width:min(400px,88vw);display:block}
.op{transform-origin:200px 200px}
.ip{transform-origin:200px 200px;cursor:pointer}
.ip path{
  fill:var(--pearl);fill-opacity:.10;
  stroke:var(--pearl);stroke-opacity:.5;stroke-width:1.1;
  transition:fill-opacity .35s ease,stroke-opacity .35s ease,filter .35s ease;
}
.ip:hover path,.ip:focus-visible path,.ip.lit path{
  fill:var(--c);fill-opacity:.62;stroke:var(--c);stroke-opacity:1;
  filter:drop-shadow(0 0 14px var(--c));
}
.ip:focus{outline:none}
.ip:focus-visible path{stroke-width:2}
.core{
  fill:var(--pearl);fill-opacity:.9;transform-origin:200px 200px;
  filter:drop-shadow(0 0 12px rgba(203,213,245,.55));
}
.hint{
  font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--faint);
  min-height:1.4em;margin-top:.9rem;transition:color .3s;
}
.hint.on{color:var(--hc)}

/* ── toc ─────────────────────────────────── */
.toc{width:var(--col);margin:4.5rem auto 0;padding-top:2.6rem;
  border-top:1px solid var(--line-soft)}
.toclist{list-style:none;margin-top:1.1rem}
.toclist li{border-bottom:1px solid var(--line-soft)}
.toclist li:first-child{border-top:1px solid var(--line-soft)}
.toclist a{
  display:flex;align-items:baseline;gap:1rem;
  padding:.75rem .1rem;text-decoration:none;color:var(--text);
  font-family:var(--serif);font-size:1.02rem;transition:color .2s,opacity .2s;
}
.toclist a:hover{color:var(--violet)}
.toc-aspect a{color:var(--c)}
.toc-aspect a:hover{color:var(--c);opacity:.7}
.toclist i{
  font-style:normal;margin-left:auto;white-space:nowrap;
  font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--faint);
}
#toc,#context,#closing,#glossary,#sources{scroll-margin-top:1.5rem}
.toplink{margin:2.5rem 0 0;text-align:right}
.aspect .toplink{width:var(--col);margin-inline:auto}
.toplink a{
  display:inline-flex;align-items:center;gap:.5rem;padding:.45rem 0;
  font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--faint);text-decoration:none;
  transition:color .2s;
}
.toplink a::before{content:'\2191';font-size:.9em;opacity:.75}
.toplink a:hover{color:var(--violet)}

/* ── context ─────────────────────────────── */
.context{width:var(--col);margin:5rem auto}
.context h2,.closing h2,.gloss h2{
  font-family:var(--serif);font-weight:400;font-size:1.75rem;
  letter-spacing:.01em;margin-block:.5rem 1.2rem;
}
.grid2{display:grid;gap:2rem 2.5rem;margin-top:1.5rem}
@media(min-width:680px){.grid2{grid-template-columns:1fr 1fr}}

/* ── aspect ──────────────────────────────── */
.aspect{
  border-top:1px solid var(--line-soft);
  padding-block:4.5rem;position:relative;scroll-margin-top:1.5rem;
}
.aspect::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:min(700px,100%);height:16rem;pointer-events:none;
  background:radial-gradient(60% 100% at 50% 0%,var(--glow),transparent 72%);
}
.aspect > *{position:relative}
.a-head{width:var(--col);margin-inline:auto}
.a-meta{
  display:flex;flex-wrap:wrap;gap:.4rem 1.1rem;align-items:baseline;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--faint);
}
.a-meta b{color:var(--c);font-weight:400}
.a-name{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(1.75rem,6.5vw,3rem);
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--c);margin-block:.55rem .35rem;line-height:1.1;
}
.rule{height:1px;background:var(--c);opacity:.55}
.rule + .rule{margin-top:2px;opacity:.22}

.quote{
  width:var(--col);margin:2.2rem auto 0;
  border-left:2px solid var(--c);padding-left:1.4rem;
}
.quote p{
  font-family:var(--serif);font-size:clamp(1.06rem,2.7vw,1.32rem);
  line-height:1.62;color:#EDEFF5;
}
.attrib{
  font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--faint);margin-top:.9rem;
}
.orig{
  font-size:.86rem;color:var(--faint);line-height:1.6;
  margin-top:.85rem;font-family:var(--serif);
}
.orig span{
  font-family:var(--mono);font-size:.56rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--c);opacity:.75;
  display:block;margin-bottom:.25rem;
}
.motto{
  width:var(--col);margin:1.9rem auto 0;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.26em;
  text-transform:uppercase;color:var(--c);
}
.essence{width:var(--col);margin:2rem auto 0}

/* shadow + remedies */
.panel{width:var(--col);margin:2.5rem auto 0;border-radius:3px}
.p-head{
  font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;
  text-transform:uppercase;margin-bottom:1rem;
  display:flex;align-items:center;gap:.7rem;
}
.p-head::after{content:'';flex:1;height:1px;background:var(--line-soft)}

.shadow{background:var(--sunk);border:1px solid var(--line-soft);padding:1.4rem 1.3rem 1.5rem}
.shadow .p-head{color:var(--faint)}
.chips{display:flex;flex-wrap:wrap;gap:.45rem}
.chip{
  font-size:.82rem;color:var(--muted);line-height:1.35;
  border:1px solid var(--line);border-radius:99px;
  padding:.3rem .8rem .35rem .6rem;
  display:inline-flex;align-items:center;gap:.45rem;
}
.chip::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--c);opacity:.5;flex:none;
}

.balance{padding-top:.4rem}
.balance .p-head{color:var(--c)}
.mech{color:#C3CAD9;margin-bottom:1.1rem}
.tell{
  border-left:2px solid var(--c);padding-left:1.2rem;
  font-family:var(--serif);font-size:clamp(1rem,2.3vw,1.12rem);
  color:#EDEFF5;line-height:1.55;
}
.tell span{
  display:block;font-family:var(--mono);font-size:.56rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--c);opacity:.8;margin-bottom:.35rem;
}
.bridge{color:var(--muted);font-size:.92rem;line-height:1.6;margin-bottom:1.2rem}

.remedies{padding-top:.4rem}
.remedies .p-head{color:var(--c)}
.rem{list-style:none;display:grid;gap:.7rem}
.rem li{
  padding-left:1.1rem;position:relative;
  font-size:.94rem;line-height:1.55;color:#C3CAD9;
}
.rem li::before{
  content:'';position:absolute;left:0;top:.62em;
  width:5px;height:5px;border-radius:50%;
  background:var(--c);
}
.rem b{color:var(--text);font-weight:600}
.rem i{font-style:normal;color:var(--muted)}

/* ── closing ─────────────────────────────── */
.closing{
  border-top:1px solid var(--line-soft);
  background:linear-gradient(180deg,rgba(167,139,250,.06),transparent 60%);
  padding-block:4.5rem;
}
.closing .wrap{max-width:640px}

/* ── glossary ────────────────────────────── */
.flowers{border-top:1px solid var(--line-soft);padding-block:4.5rem;
  background:linear-gradient(180deg,rgba(111,217,124,.04),transparent 55%)}
.flowers h2{font-family:var(--serif);font-weight:400;font-size:1.75rem;margin-block:.5rem 1.2rem}
.fl-card{border-left:2px solid var(--c);padding-left:1.3rem;margin-top:1.8rem}
.fl-asp{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--c)}
.fl-name{font-family:var(--serif);font-size:1.2rem;color:var(--text);margin:.2rem 0 .1rem}
.fl-latin{font-family:var(--serif);font-style:italic;font-size:.92rem;color:var(--muted)}
.fl-sig{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;color:var(--c);margin-top:.5rem}
.fl-card p{font-size:.93rem;color:#C3CAD9;margin-top:.6rem}
.fl-card .mother{font-family:var(--serif);font-style:italic;color:#EDEFF5;border-top:1px solid var(--line-soft);
  margin-top:.8rem;padding-top:.7rem}
.gloss{border-top:1px solid var(--line-soft);padding-block:4.5rem}
.gterms{list-style:none;display:grid;gap:1.15rem;margin-top:1.6rem}
.gterms li{
  border-left:1px solid var(--line);padding-left:1.1rem;
}
.gterms b{
  display:block;font-family:var(--serif);font-size:1.02rem;
  font-weight:400;color:var(--violet);letter-spacing:.02em;
}
.gterms span{font-size:.9rem;color:var(--muted);line-height:1.6}
.note{
  margin-top:2rem;padding:1rem 1.2rem;
  background:var(--sunk);border:1px solid var(--line-soft);
  font-size:.88rem;color:var(--muted);border-radius:3px;
}
.note b{color:var(--text);font-weight:600}

/* ── footer ──────────────────────────────── */
.foot{
  border-top:1px solid var(--line-soft);padding-block:3rem 4rem;
  background:var(--sunk);
}
.foot h2{
  font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--faint);font-weight:400;margin-bottom:1rem;
}
.src{list-style:none;display:grid;gap:.55rem;font-size:.84rem;color:var(--muted)}
.src li{padding-left:1rem;position:relative;line-height:1.55}
.src li::before{content:'';position:absolute;left:0;top:.65em;width:4px;height:1px;background:var(--faint)}
.foot em{font-style:italic;color:#B4BCCC}
.sign{
  margin-top:2.5rem;font-family:var(--mono);font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:#3E4557;
}

/* ── motion ──────────────────────────────── */
@keyframes bloom{from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
.op,.ip,.core{opacity:0}
.bloomed .op,.bloomed .ip,.bloomed .core{
  opacity:1;animation:bloom .8s cubic-bezier(.2,.8,.3,1) backwards;
  animation-delay:var(--d,0s);
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .op,.ip,.core{opacity:1}
  .bloomed .op,.bloomed .ip,.bloomed .core{animation:none}
  *{transition-duration:.01ms !important}
}
</style>
</head>
<body>

<header class="topbar">
  <a class="home" id="homelink" href="index.html">Home</a>
  <div class="mark" id="mark"></div>
  <nav class="langs" aria-label="Language">
    <button data-lang="en" aria-current="true">EN</button>
    <button data-lang="de" aria-current="false">DE</button>
    <button data-lang="hr" aria-current="false">HR</button>
  </nav>
  <span class="ver">v7 (a)</span>
</header>

<main>
  <section class="hero">
    <p class="eyebrow" id="h-eyebrow"></p>
    <h1 id="h-title"></h1>
    <p class="lede" id="h-lede"></p>

    <p class="attrs" id="h-attrs"></p>
  </section>

  <nav class="toc" id="toc" aria-labelledby="toc-h">
    <p class="eyebrow" id="toc-h"></p>
    <ol class="toclist" id="toc-list"></ol>
  </nav>

  <section class="context" id="context">
    <p class="eyebrow" id="c-eyebrow"></p>
    <h2 id="c-title"></h2>
    <div class="grid2 prose" id="c-body"></div>
    <p class="toplink" data-top></p>
  </section>

  <div id="aspects"></div>

  <section class="flowers" id="flowers">
    <div class="wrap">
      <p class="eyebrow" id="fl-eyebrow"></p>
      <h2 id="fl-title"></h2>
      <div class="prose" id="fl-intro"></div>
      <div id="fl-list"></div>
      <p class="note" id="fl-note"></p>
      <p class="toplink" data-top></p>
    </div>
  </section>

  <section class="closing" id="closing">
    <div class="wrap">
      <p class="eyebrow" id="z-eyebrow"></p>
      <h2 id="z-title"></h2>
      <div class="prose" id="z-body"></div>
      <p class="toplink" data-top></p>
    </div>
  </section>

  <section class="gloss" id="glossary">
    <div class="wrap">
      <p class="eyebrow" id="g-eyebrow"></p>
      <h2 id="g-title"></h2>
      <ul class="gterms" id="g-list"></ul>
      <p class="note" id="g-note"></p>
      <p class="toplink" data-top></p>
    </div>
  </section>

  <footer class="foot" id="sources">
    <div class="wrap">
      <h2 id="f-title"></h2>
      <ul class="src" id="f-list"></ul>
    </div>

    <div class="coda">
    <svg class="symbol" viewBox="0 0 400 400" role="img" aria-labelledby="sym-t">
      <title id="sym-t">The Mother's symbol. Four inner petals, one for each power.</title>
      <g id="outer"></g>
      <g id="inner"></g>
      <circle class="core" cx="200" cy="200" r="20" style="--d:1.55s"></circle>
    </svg>
    <p class="hint" id="hint"></p>
      <p class="sign" id="f-sign"></p>
    </div>
  </footer>
</main>

<script>
/* ═══════════════════════════════════════════════════════════
   DICTIONARY — every string on this page, in en / de / hr.
   Switching language re-renders from here. Nothing is fetched.
   ═══════════════════════════════════════════════════════════ */

const AXES = [
  {id:'maheshwari',  c:'--pearl', glow:'rgba(203,213,245,.09)', deg:180},
  {id:'mahakali',    c:'--ember', glow:'rgba(255,77,94,.10)',   deg:0},
  {id:'mahalakshmi', c:'--aqua',  glow:'rgba(53,201,232,.09)',  deg:90},
  {id:'mahasaraswati',c:'--leaf', glow:'rgba(111,217,124,.08)', deg:270}
];

const T = {

/* ───────────────────────── ENGLISH ───────────────────────── */
en:{
  htmlTitle:"The Four Powers of the Mother",
  mark:"Sri Aurobindo · The Mother · 1928",
  eyebrow:"Sri Aurobindo · The Mother · Chapter VI",
  title:"The Four Powers<br>of <em>the Mother</em>",
  lede:"One force, four faces. Sri Aurobindo's 1928 chapter, set beside the shadow each power casts and the practices that meet it.",
  hint:"Tap a petal",
  attrs:"Wisdom · Strength · Harmony · Perfection",
  L:{element:"Element",pillar:"Matrimandir",attribute:"Attribute",shadow:"Shadow",
     remedies:"Remedies",attrib:"Sri Aurobindo · The Mother · VI",orig:"Original, English",balance:"Healing the imbalance",tellPrefix:"You are in it when",toc:"Contents"},
  dirs:{N:"North",E:"East",S:"South",W:"West"},

  ctxEyebrow:"Background",
  ctxTitle:"Where this comes from",
  ctx:[
    {h:"The woman",p:["Mirra Alfassa was born in Paris on 21 February 1878, to an Egyptian mother and a Turkish father, both from Sephardic Jewish families. She trained as a painter at the Académie Julian and was a serious musician. She studied occultism with Max Théon in Tlemcen, Algeria, and led study groups in Paris long before she saw India.","She first reached Pondicherry on 29 March 1914 and met Sri Aurobindo. The war took her away again, including four years in Japan; she returned for good in 1920. When Sri Aurobindo withdrew into seclusion on 24 November 1926, she took charge of the ashram gathering around him. She opened its school in 1943 and inaugurated Auroville on 28 February 1968. She died in Pondicherry on 17 November 1973, aged ninety-five."]},
    {h:"The book",p:["The four powers are described in the sixth chapter of a short book Sri Aurobindo published in 1928, called simply <em>The Mother</em>. He names four leading Powers and Personalities through which the one Force meets the world, gives them four attributes and four names, and takes each in turn.","The Mother herself commented on this chapter in three talks in August 1954. Everything set in serif on this page comes from that text."]},
    {h:"The symbol",p:["Her own explanation was short. The central circle is the Divine Consciousness. The four inner petals are these four powers. The twelve outer petals are the twelve powers she manifests for her work.","In March 1934 Sri Aurobindo gave the colours: the centre and the four powers white, and the twelve in three graded groups, red through orange to yellow, yellow through green to blue, blue through violet back to red. If white was inconvenient, the centre could be gold."]},
    {h:"The compass",p:["The four pairs of pillars holding up the Matrimandir in Auroville carry these four names, and they stand on the four axes: Maheshwari south, Mahakali north, Mahalakshmi east, Mahasaraswati west. The petals above sit on those same axes, which is why the page begins in the north."]}
  ],

  aspects:[
    {
      name:"Maheshwari", element:"Air", dir:"S", attribute:"Wisdom",
      motto:"Wisdom · Knowledge · Vastness",
      quote:"For she is the mighty and wise One who opens us to the supramental infinites &amp; cosmic vastness, to the grandeur of the supreme Light, to a treasure-house of miraculous knowledge, to the measureless movement of the Mother's eternal forces. Tranquil is she and wonderful, great and calm for ever. Nothing can move her because all wisdom is in her…",
      essence:"Sri Aurobindo seats her in the wideness above thinking mind and will. She lays down the large lines of the world forces: she sees the whole, and how it must be. She meets each person according to their own nature, giving the wise a greater light and leading the blind according to their blindness. Her compassion has no end. Even her refusals are only a postponement, even her punishments are a grace. But compassion never bends her from the truth of a thing, and she can feel too calm and too far away for a small nature to reach.",
      imbalance:"Air rises and abstracts. That is its gift and its trap. A mind wide enough to hold the whole picture will, if nothing checks it, seize one frame and call it the truth, and from there the slide is quick: vastness narrows to a view, the view hardens into a belief, the belief becomes dogma. Everything else on the card follows from that single move. You judge, because a fixed position needs a wrong to define its right. You criticise, and turn cynical when the world declines to match. You overthink, because thought is now the only instrument you trust. The opposite failure is the same element in the other direction: too much air and you lift off entirely, detached, analysing a life instead of standing in one.",
      tell:"You are arguing in your head with someone who is not in the room.",
      bridge:"Notice that not one of them argues with the belief. They all work upstream of it, treating conviction as something editable rather than something you are. Remote viewing and the third eye are that same faculty running clean: perception without grip.",
      shadow:["Beliefs","Dogma","Judgemental, wrong or right","Critical","Cynical","Narrow minded","Stuck in opinions","Blaming","Overthinking, analysis paralysis","Detached, cut off","Too much in the air, not grounded","Manipulative"],
      remedies:[
        {t:"Conscious creator",d:"moving from programmed automaton into the blueprint of the soul"},
        {t:"Imagination, Russian healers",d:"operating in the energetic field"},
        {t:"Timeline shifts"},

        {t:"Discharging negative beliefs"},
        {t:"Universal pharmacy",d:"from the third eye"},
        {t:"Remote viewing"},
        {t:"Moving into the highest version of yourself"}
      ]
    },
    {
      name:"Mahakali", element:"Fire", dir:"N", attribute:"Strength",
      motto:"Transformation · Noble Aims",
      quote:"There is in her an overwhelming intensity, a mighty passion of force to achieve, a divine violence rushing to shatter every limit and obstacle.",
      essence:"Not wideness but height, Sri Aurobindo writes; not wisdom but force. She is swiftness: the direct stroke, the frontal assault that carries everything before it. Indifference, negligence and sloth in the work she cannot bear, and she will wake a sleeper with sharp pain if that is what is needed. Her love is as fierce as her wrath. Without her, what is done in a day might have taken centuries. But few can carry her working, and when a disciple asked which aspects to keep in front, Sri Aurobindo named the other two.",
      imbalance:"Fire consumes. Aimed at an obstacle it clears the way; aimed at a person it burns them. Every item on that card is one movement, force that has lost its aim. Rage is force without direction. Overpowering is force without consent. My way or the highway is force without patience. Grand showy actions with little depth is force that has turned into display. Underneath all of them sits the ego, and that is the actual fault: Kali's intensity still at full strength, but serving the small self instead of the work. Dark magic is only the end of that road, force turned deliberately against another.",
      tell:"Being right matters more to you than the thing you were trying to do.",
      bridge:"You cannot reason with fire, and none of these tries. Each one is either a container or a discharge: the ceremony gives it a hearth, the breathwork a controlled burn, sound and vibration a channel, karmic clearing something legitimate to consume. Transcending ego is the real cure, because ego is what misaims the fire in the first place.",
      shadow:["Rage, anger, violence, aggression","Misuse of power, overpowering","Destructive behaviour","My way or the highway","Grand showy actions, little depth","Ego, big self and small self","Hard behaviour","Dark magic"],
      remedies:[

        {t:"Holotropic breathwork"},
        {t:"Karmic cleansing",d:"history clearing"},
        {t:"Sound healing, vibrational healing"},

    {
      name:"Mahalakshmi", element:"Water", dir:"E", attribute:"Harmony",
      motto:"Divine Rhythm · Unity",
      quote:"Harmony and Beauty of the Mind &amp; Soul, harmony and Beauty of the Thoughts &amp; feelings, Harmony and Beauty in every outward act &amp; movement, Harmony and Beauty of the Life &amp; surroundings, this is the demand of Mahalakshmi.",
      essence:"Without her, Sri Aurobindo says, wisdom and force would be incomplete. She is the attraction that draws things and beings together so that a hidden delight can play through them, and she is the aspect the human heart reaches for most easily: Maheshwari can seem too vast, Mahakali too formidable, but everyone turns towards Mahalakshmi. She is also the hardest to keep. She does not insist and she does not fight for her place. Where things are coarse or mean, or a heart is crowded with grudge, she simply veils her face and waits.",
      imbalance:"Water flows and takes a shape. Dam it and it stagnates; leave it no banks and it floods. Both failures are on that card. Hiding your feelings is the dam, and what stands behind it turns to shame and jealousy. Being swept off in feeling is the flood. Victim consciousness is water that has found a low place and stopped moving. People pleasing is water taking someone else's shape because it has no banks of its own. And scarcity and greed are one thing said twice: a heart that does not trust the flow will hoard against it.",
      tell:"You are keeping score.",
      bridge:"Sri Aurobindo gives the logic himself. She does not fight for her place; where things are coarse, or a heart is crowded with grudge, she veils her face and waits. So none of this summons her. It clears what drove her out, which is why the whole card is forgiveness work. You make the room fit to live in, and she returns on her own.",
      shadow:["Not in touch with your feelings, hiding feelings","Dwelling in negative feelings, swept away by feelings","Victim consciousness, poor me","No self love, shame, jealousy","People pleasing","Emotionally manipulative","Scarcity consciousness","Greed, over-accumulation of pleasures, addictions","Not forgiving, self and others"],
      remedies:[
        {t:"Trauma relief, psychotherapy"},
        {t:"Inner child work"},
        {t:"Hypnotherapy"},
        {t:"Deep inquiry",d:"Louise Hay, Byron Katie"},
        {t:"Ho'oponopono"},
        {t:"Forgiveness processes"},
        {t:"Sacred chamber"},
        {t:"Clearing the connection",d:"crystalline silver cord"},
        {t:"EFT",d:"emotional freedom techniques"}
      ]
    },
    {
      name:"Mahasaraswati", element:"Earth", dir:"W", attribute:"Perfection",
      motto:"Right Time · Right Instrument · Right Process",
      quote:"Mahasaraswati is the Mother's Power of Work &amp; her Spirit of Perfection and order… She is the most skillful in executive faculty and the nearest to physical Nature… she presides over their detail of organization &amp; execution.",
      essence:"The youngest of the four and the closest to physical nature. Maheshwari lays the large lines, Mahakali drives the energy, Mahalakshmi finds the rhythm, and Mahasaraswati takes the detail: the fit of the parts, the exactness of the result. Science, craft and technique are her province. Her work is minute and can seem interminable to impatience, but nothing is skipped and nothing is left half done. She is the most patient of the four with human imperfection, on one condition: that your will is single and straight. A double mind she will not carry, and her irony is merciless to pretence.",
      imbalance:"Earth holds form. Too much of it and she sets: stuckness, tamas, the body that will not move. Too little and form collapses into unhealthy habit and disordered eating, a life with no rhythm in it. But the subtlest failure on that card is also the deepest, following rules even when they go against your values. That is Earth's own gift turned counterfeit. Her whole nature is right process, and the forgery of right process is mere procedure: you keep the form and lose the reason for it. Stress and overload is the same forgery, work as a casing you sit inside rather than a thing you are doing.",
      tell:"You can explain exactly why you are doing something you do not want to do.",
      bridge:"Nothing on that card is psychological. It is all body: food, sleep, breath, movement, meridians, herbs, animals, shaking. That is not an oversight. Earth's imbalance cannot be argued with, because the mind is not where it lives. You shift it by changing what your hands and feet actually do, daily.",
      shadow:["Stuckness","Tamasic","Laziness","Unhealthy behaviour, eating disorder","Too much in the vital","Stressed, overloaded with work","Following rules even when they go against your values","Out of harmony in what you do"],
      remedies:[

  clEyebrow:"Practice",
  clTitle:"Holding all four",
  cl:["In November 1926 a disciple asked Sri Aurobindo about a power descending into a vessel too small to hold it. His answer was practical. Have Mahasaraswati and Maheshwari working, he said; that is how he had worked himself. Many cannot bear Mahakali, and only a few can pull with impunity.",
      "All four have to be harmonised in us. The ideal condition, he said, is to have in front whichever aspect the action actually needs, with the other three standing behind it.",
      "The book asks three things of anyone who wants this: consciousness, plasticity, and unreserved surrender. And it says that beyond the four there is a further Presence, of Ananda, which cannot come forward until the four have found their harmony first."],

  glEyebrow:"Dictionary",
  glTitle:"Glossary",
  gl:[
    {t:"Shakti",d:"The conscious force of the Divine: the power side of what the Sanskrit tradition calls the Divine, approached as feminine."},
    {t:"Mahashakti",d:"The universal Mother. The same force as it creates, contains and moves through all the worlds."},
    {t:"Supramental, Supermind",d:"Sri Aurobindo's term for a truth-consciousness above mind, which he held to be the next step of evolution rather than an escape from it."},
    {t:"Vital",d:"In his vocabulary, the life-force part of a person: desire, drive, passion, ambition. Not a synonym for emotional."},
    {t:"Tamas, tamasic",d:"One of the three qualities of nature: inertia, dullness, heaviness, resistance to movement. The other two are rajas, drive, and sattva, clarity."},
    {t:"Ananda",d:"Delight, bliss. In this system not a mood but a substance of existence."},
    {t:"Psychic being",d:"He uses psychic for the soul, the growing divine spark behind the personality. It has nothing to do with psychic powers."},
    {t:"Matrimandir",d:"The spherical inner chamber at the centre of Auroville, held up by four pairs of pillars named for these four aspects."},
    {t:"EFT",d:"Emotional freedom techniques: tapping acupressure points with the fingertips while holding a difficulty in mind. The card writes it out as emotional efficiency therapy; the usual expansion is emotional freedom techniques."},
    {t:"Ho'oponopono",d:"A Hawaiian practice of reconciliation and forgiveness, widely known in a short modern form of four phrases: I am sorry, please forgive me, thank you, I love you."},
    {t:"Holotropic breathwork",d:"Accelerated breathing with music, developed by Stanislav and Christina Grof in the 1970s to reach non-ordinary states without drugs."},
    {t:"Feldenkrais",d:"A movement method developed by Moshé Feldenkrais that re-educates habitual patterns through slow, attentive movement."},
    {t:"Deep inquiry",d:"Turning a belief around and asking whether it is actually true. Byron Katie's The Work and Louise Hay's mirror work are the two named on the card."},
    {t:"Bio resonance",d:"A device-based method claiming to read and correct the body's electromagnetic frequencies. It has no accepted clinical evidence base."},
    {t:"Remote viewing",d:"Attempting to perceive a distant place or object without the senses. Studied by United States intelligence programmes into the 1990s and closed without a confirmed effect."},
    {t:"Russian healers",d:"Shorthand for the Grabovoi and Petrov lineage, which teaches healing through structured visualisation of the body in an energetic field. It is not a medical method."}
  ],
  glNote:"<b>A word on the rest.</b> Sacred chamber, crystalline silver cord, universal pharmacy and timeline shift belong to particular teaching lineages and have no agreed definition outside them. If you use them with a group, define them yourself before you use them.",

  srcTitle:"Sources",
  src:[
    "Sri Aurobindo, <em>The Mother</em>, 1928, chapter VI. Complete Works of Sri Aurobindo, vol. 32.",
    "The Mother's commentary on that chapter: three talks, 11, 18 and 25 August 1954. Collected Works of the Mother, vol. 6.",
    "<em>Evening Talks with Sri Aurobindo</em>, 9 November 1926, on keeping the four aspects in front and behind.",

    "The elements, the shadow lists and the remedy lists: handwritten workshop cards, transcribed. They are a contemporary reading laid over the original text, not part of it."

  sign:"Four powers · one Mother",
  homelink:"Home",
  flEyebrow:"The Mother's flowers",
  flTitle:"Beauty as a way through",
  mSig:"the Mother",
  flIntro:["The Mother said the Divine shows itself in our life through beauty, and she spent decades giving spiritual significances to flowers, entering into contact, as she put it, with each flower's inner truth. She named hundreds. Among them, she named flowers for these very aspects, so the four powers each have a bloom.",
    "Sri Aurobindo explained that flower significances come in orders: one indicates a psychological quality such as faith or love, another indicates the aura or the activity of a divine being. The aspect-flowers belong to that second order. They are the powers made visible, growing.",
    "This is the gentlest remedy of all, and free. Sit with the flower of the power you are missing. Find it growing, or hold a picture, or come to the flower gardens around the Matrimandir in Auroville, where the whole of this is a living place rather than a diagram, and meditate among them."],
  flowers:[
    {asp:"Ishwari · Air", name:"Siris tree", latin:"Albizia lebbeck",
     sig:"Integral wisdom",
     text:"For the power that sees the whole. When your load is in the head, dogma and analysis and distance, the wide calm of wisdom is what you are reaching back toward."},
    {asp:"Kali · Fire", name:"Chinese hibiscus", latin:"Hibiscus rosa-sinensis",
     sig:"Agni · dynamic, controlled power",
     text:"For the fire that has kept its aim. Agni is the flame that carries the offering without consuming the one who makes it. Force that serves rather than scorches."},
    {asp:"Lakshmi · Water", name:"Water lily", latin:"Nymphaea",
     sig:"Integral wealth of Mahalakshmi",
     text:"For the heart's abundance. The flower that opens on still water, rooted in the depth and flowering at the surface. Beauty and harmony made into a single bloom.",
     mother:null},
    {asp:"Saraswati · Earth", name:"Rondeletia", latin:"Rondeletia odorata",
     sig:"Mahasaraswati's perfection in works",
     text:"For the craft that finishes cleanly. This is the flower the Mother named for Saraswati's perfection, and her entire comment on it was four words.",
     mother:"Is not satisfied with makeshift."}
  ],
  flNote:"<b>Her own caution.</b> The Mother was careful about this in a way most who quote her are not. A flower, she said, has no mental consciousness; to give it a precise meaning is a mental projection, one the flower may vibrate to and accept, but a projection all the same. Two of these four she named directly. Two, Ishwari's and Kali's, we have matched by attribute and mark as our reading, not her word."

de:{
  htmlTitle:"Die vier Kräfte der Mutter",
  mark:"Sri Aurobindo · Die Mutter · 1928",
  eyebrow:"Sri Aurobindo · Die Mutter · Kapitel VI",
  title:"Die vier Kräfte<br>der <em>Mutter</em>",
  lede:"Eine Kraft, vier Gesichter. Sri Aurobindos Kapitel von 1928, gestellt neben den Schatten, den jede Kraft wirft, und die Praktiken, die ihm begegnen.",
  hint:"Tippe auf ein Blütenblatt",

  L:{element:"Element",pillar:"Matrimandir",attribute:"Attribut",shadow:"Schatten",
     remedies:"Heilmittel",attrib:"Sri Aurobindo · Die Mutter · VI",orig:"Original, Englisch",balance:"Das Ungleichgewicht heilen",tellPrefix:"Du steckst darin, wenn",toc:"Inhalt"},

  ctxEyebrow:"Hintergrund",
  ctxTitle:"Woher das kommt",
  ctx:[
    {h:"Die Frau",p:["Mirra Alfassa wurde am 21. Februar 1878 in Paris geboren, Tochter einer ägyptischen Mutter und eines türkischen Vaters, beide aus sephardisch-jüdischen Familien. Sie war ausgebildete Malerin der Académie Julian und ernsthafte Musikerin. Bei Max Théon in Tlemcen, Algerien, studierte sie Okkultismus, und sie leitete Studiengruppen in Paris, lange bevor sie Indien sah.","Am 29. März 1914 erreichte sie zum ersten Mal Pondicherry und begegnete Sri Aurobindo. Der Krieg trieb sie wieder fort, darunter vier Jahre in Japan; 1920 kehrte sie endgültig zurück. Als Sri Aurobindo sich am 24. November 1926 in die Zurückgezogenheit begab, übernahm sie den Ashram, der sich um ihn gebildet hatte. 1943 eröffnete sie dessen Schule, am 28. Februar 1968 weihte sie Auroville ein. Sie starb am 17. November 1973 in Pondicherry, fünfundneunzigjährig."]},
    {h:"Das Buch",p:["Die vier Kräfte werden im sechsten Kapitel eines schmalen Buches beschrieben, das Sri Aurobindo 1928 veröffentlichte und schlicht <em>Die Mutter</em> nannte. Er nennt vier führende Kräfte und Persönlichkeiten, durch die die eine Kraft der Welt begegnet, gibt ihnen vier Attribute und vier Namen und nimmt sich jede einzeln vor.","Die Mutter selbst kommentierte dieses Kapitel in drei Gesprächen im August 1954. Alles, was auf dieser Seite in der Serifenschrift steht, stammt aus jenem Text."]},
    {h:"Das Symbol",p:["Ihre eigene Erklärung war kurz. Der zentrale Kreis ist das Göttliche Bewusstsein. Die vier inneren Blütenblätter sind diese vier Kräfte. Die zwölf äußeren Blütenblätter sind die zwölf Kräfte, die sie für ihr Werk manifestiert.","Im März 1934 gab Sri Aurobindo die Farben an: Mitte und vier Kräfte weiß, die zwölf in drei abgestuften Gruppen, Rot über Orange zu Gelb, Gelb über Grün zu Blau, Blau über Violett zurück zu Rot. Falls Weiß unpassend sei, dürfe die Mitte golden sein."]},
    {h:"Der Kompass",p:["Die vier Säulenpaare, die das Matrimandir in Auroville tragen, führen diese vier Namen und stehen auf den vier Achsen: Maheshwari im Süden, Mahakali im Norden, Mahalakshmi im Osten, Mahasaraswati im Westen. Die Blütenblätter oben liegen auf ebendiesen Achsen, und darum beginnt die Seite im Norden."]}
  ],

  aspects:[
    {
      name:"Maheshwari", element:"Luft", dir:"S", attribute:"Weisheit",
      motto:"Weisheit · Wissen · Weite",
      quote:"Denn sie ist die Mächtige und Weise, die uns den supramentalen Unendlichkeiten und der kosmischen Weite öffnet, der Größe des höchsten Lichtes, einer Schatzkammer wunderbaren Wissens, der unermesslichen Bewegung der ewigen Kräfte der Mutter. Ruhig ist sie und wunderbar, groß und für immer gelassen. Nichts kann sie bewegen, denn alle Weisheit ist in ihr…",
      quoteEn:"For she is the mighty and wise One who opens us to the supramental infinites &amp; cosmic vastness, to the grandeur of the supreme Light, to a treasure-house of miraculous knowledge, to the measureless movement of the Mother's eternal forces. Tranquil is she and wonderful, great and calm for ever. Nothing can move her because all wisdom is in her…",
      essence:"Sri Aurobindo setzt sie in die Weite oberhalb von denkendem Geist und Willen. Sie legt die großen Linien der Weltkräfte fest: sie sieht das Ganze und wie es sein muss. Jedem Menschen begegnet sie gemäß seiner eigenen Natur, den Weisen gibt sie ein größeres Licht, die Blinden führt sie gemäß ihrer Blindheit. Ihr Mitgefühl hat kein Ende. Selbst ihre Zurückweisungen sind nur ein Aufschub, selbst ihre Strafen sind eine Gnade. Doch Mitgefühl beugt sie niemals von der Wahrheit einer Sache ab, und sie kann zu ruhig und zu fern wirken, als dass eine kleine Natur sie erreichen könnte.",
      imbalance:"Luft steigt auf und abstrahiert. Das ist ihre Gabe und ihre Falle. Ein Geist, weit genug für das ganze Bild, greift sich, wenn nichts ihn hält, einen einzigen Rahmen heraus und nennt ihn die Wahrheit. Von dort geht es schnell: Weite verengt sich zu einer Ansicht, die Ansicht erhärtet zum Glaubenssatz, der Glaubenssatz wird Dogma. Alles Weitere auf der Karte folgt aus diesem einen Zug. Du urteilst, denn eine feste Position braucht ein Falsch, um ihr Richtig zu bestimmen. Du kritisierst und wirst zynisch, wenn die Welt sich weigert zu passen. Du grübelst, denn Denken ist nun das einzige Werkzeug, dem du traust. Die Gegenrichtung ist dasselbe Element, nur anders gescheitert: zu viel Luft, und du hebst ab, abgetrennt, ein Leben analysierend statt in einem zu stehen.",
      tell:"Du streitest im Kopf mit jemandem, der nicht im Raum ist.",
      bridge:"Beachte: keines davon streitet mit dem Glaubenssatz. Alle setzen oberhalb davon an und behandeln Überzeugung als etwas Veränderbares statt als etwas, das du bist. Fernwahrnehmung und das dritte Auge sind dieselbe Fähigkeit, sauber laufend: Wahrnehmung ohne Griff.",
      shadow:["Glaubenssätze","Dogma","Urteilend, richtig oder falsch","Kritisch","Zynisch","Engstirnig","In Meinungen festgefahren","Schuldzuweisung","Grübeln, Analyse-Lähmung","Abgetrennt, abgeschnitten","Zu sehr in der Luft, nicht geerdet","Manipulativ"],
      remedies:[
        {t:"Bewusster Schöpfer",d:"vom programmierten Automaten in den Bauplan der Seele"},
        {t:"Imagination, russische Heiler",d:"Arbeit im energetischen Feld"},
        {t:"Zeitlinien-Verschiebungen"},
        {t:"Erschaffen neuer Realität",d:"Laserstrahl auf die Leinwand, Regenbogenfarben, du bist der Regisseur"},
        {t:"Entladen negativer Glaubenssätze"},
        {t:"Universelle Apotheke",d:"aus dem dritten Auge"},
        {t:"Fernwahrnehmung, remote viewing"},
        {t:"In die höchste Version deiner selbst treten"}
      ]
    },
    {
      name:"Mahakali", element:"Feuer", dir:"N", attribute:"Stärke",
      motto:"Transformation · Edle Ziele",
      quote:"In ihr ist eine überwältigende Intensität, eine mächtige Leidenschaft der Kraft, zu vollbringen, eine göttliche Gewalt, die heranstürmt, um jede Grenze und jedes Hindernis zu zerschmettern.",
      quoteEn:"There is in her an overwhelming intensity, a mighty passion of force to achieve, a divine violence rushing to shatter every limit and obstacle.",
      essence:"Nicht Weite, sondern Höhe, schreibt Sri Aurobindo; nicht Weisheit, sondern Kraft. Sie ist Schnelligkeit: der direkte Schlag, der Frontalangriff, der alles vor sich her trägt. Gleichgültigkeit, Nachlässigkeit und Trägheit im Werk erträgt sie nicht, und sie weckt den Schlafenden notfalls mit scharfem Schmerz. Ihre Liebe ist so heftig wie ihr Zorn. Ohne sie könnte das, was an einem Tag geschieht, Jahrhunderte gedauert haben. Doch nur wenige tragen ihr Wirken, und als ein Schüler fragte, welche Aspekte man vorne halten solle, nannte Sri Aurobindo die beiden anderen.",
      imbalance:"Feuer verzehrt. Auf ein Hindernis gerichtet, räumt es den Weg; auf einen Menschen gerichtet, verbrennt es ihn. Jeder Punkt auf der Karte ist eine einzige Bewegung: Kraft, die ihr Ziel verloren hat. Wut ist Kraft ohne Richtung. Überwältigung ist Kraft ohne Einverständnis. Mein Weg oder gar nicht ist Kraft ohne Geduld. Große Show mit wenig Tiefe ist Kraft, die zur Zurschaustellung geworden ist. Unter allem sitzt das Ego, und das ist der eigentliche Fehler: Kalis Intensität in voller Stärke, aber im Dienst des kleinen Selbst statt des Werkes. Schwarze Magie ist nur das Ende dieses Weges, Kraft, absichtlich gegen einen anderen gewendet.",
      tell:"Rechthaben ist dir wichtiger als das, was du eigentlich tun wolltest.",
      bridge:"Mit Feuer lässt sich nicht reden, und keines davon versucht es. Jedes ist entweder ein Gefäß oder eine Entladung: die Zeremonie gibt ihm eine Feuerstelle, das Atmen einen kontrollierten Brand, Klang und Schwingung einen Kanal, karmische Reinigung etwas Legitimes zum Verzehren. Das Ego zu überschreiten ist die eigentliche Heilung, denn das Ego ist es, was das Feuer falsch richtet.",
      shadow:["Wut, Zorn, Gewalt, Aggression","Machtmissbrauch, Überwältigung","Zerstörerisches Verhalten","Mein Weg oder gar nicht","Große Show, wenig Tiefe","Ego, großes und kleines Selbst","Hartes Verhalten","Schwarze Magie"],
      remedies:[
        {t:"Feuerzeremonie"},
        {t:"Sterbebett-Meditation"},
        {t:"Holotropes Atmen"},
        {t:"Karmische Reinigung",d:"Klärung der eigenen Geschichte"},
        {t:"Klangheilung, Schwingungsheilung"},
        {t:"Homöopathie, Bioresonanz"},
        {t:"Heilung der Zellen in anderen Dimensionen"},
        {t:"Alchemie"},
        {t:"Das Ego überschreiten"}
      ]
    },
    {
      name:"Mahalakshmi", element:"Wasser", dir:"E", attribute:"Harmonie",
      motto:"Göttlicher Rhythmus · Einheit",
      quote:"Harmonie und Schönheit des Geistes und der Seele, Harmonie und Schönheit der Gedanken und Gefühle, Harmonie und Schönheit in jeder äußeren Handlung und Bewegung, Harmonie und Schönheit des Lebens und der Umgebung: das ist die Forderung Mahalakshmis.",
      quoteEn:"Harmony and Beauty of the Mind &amp; Soul, harmony and Beauty of the Thoughts &amp; feelings, Harmony and Beauty in every outward act &amp; movement, Harmony and Beauty of the Life &amp; surroundings, this is the demand of Mahalakshmi.",
      essence:"Ohne sie, sagt Sri Aurobindo, blieben Weisheit und Kraft unvollständig. Sie ist die Anziehung, die Dinge und Wesen zusammenführt, damit eine verborgene Wonne durch sie spielen kann, und sie ist der Aspekt, nach dem das menschliche Herz am leichtesten greift: Maheshwari kann zu weit erscheinen, Mahakali zu furchtbar, doch alle wenden sich Mahalakshmi zu. Sie ist zugleich am schwersten zu halten. Sie besteht nicht auf sich und kämpft nicht um ihren Platz. Wo es grob oder gemein ist oder ein Herz von Groll erfüllt, verhüllt sie einfach ihr Gesicht und wartet.",
      imbalance:"Wasser fließt und nimmt eine Form an. Staue es, und es fault; lass ihm keine Ufer, und es überschwemmt. Beide Fehlformen stehen auf der Karte. Gefühle zu verbergen ist der Damm, und was sich dahinter staut, wird zu Scham und Eifersucht. Von Gefühlen fortgerissen zu werden ist die Flut. Opferbewusstsein ist Wasser, das eine Senke gefunden hat und stehen blieb. Gefallsucht ist Wasser, das die Form eines anderen annimmt, weil es keine eigenen Ufer hat. Und Mangel und Gier sind dasselbe, zweimal gesagt: ein Herz, das dem Fließen nicht traut, hortet dagegen an.",
      tell:"Du führst Buch.",
      bridge:"Sri Aurobindo liefert die Logik selbst. Sie kämpft nicht um ihren Platz; wo es grob ist oder ein Herz von Groll erfüllt, verhüllt sie ihr Gesicht und wartet. Nichts hiervon ruft sie also herbei. Es räumt weg, was sie vertrieben hat, und darum ist die ganze Karte Vergebungsarbeit. Du machst den Raum bewohnbar, und sie kommt von selbst zurück.",
      shadow:["Kein Kontakt zu den eigenen Gefühlen, Gefühle verbergen","In negativen Gefühlen verweilen, von Gefühlen fortgerissen","Opferbewusstsein, armes Ich","Keine Selbstliebe, Scham, Eifersucht","Gefallsucht","Emotional manipulativ","Mangelbewusstsein","Gier, Anhäufung von Genüssen, Süchte","Nicht vergeben, sich selbst und anderen"],
      remedies:[
        {t:"Traumaentlastung, Psychotherapie"},
        {t:"Arbeit mit dem inneren Kind"},
        {t:"Hypnotherapie"},
        {t:"Tiefe Selbstbefragung",d:"Louise Hay, Byron Katie"},
        {t:"Ho'oponopono"},
        {t:"Vergebungsprozesse"},
        {t:"Heilige Kammer"},
        {t:"Klärung der Verbindung",d:"kristalline Silberschnur"},
        {t:"EFT",d:"emotional freedom techniques, Klopfakupressur"}
      ]
    },
    {
      name:"Mahasaraswati", element:"Erde", dir:"W", attribute:"Vollkommenheit",
      motto:"Rechte Zeit · Rechtes Werkzeug · Rechter Prozess",
      quote:"Mahasaraswati ist die Arbeitskraft der Mutter und ihr Geist der Vollkommenheit und Ordnung… Sie ist die Geschickteste in der ausführenden Fähigkeit und der physischen Natur am nächsten… sie waltet über deren Einzelheiten der Organisation und Ausführung.",
      quoteEn:"Mahasaraswati is the Mother's Power of Work &amp; her Spirit of Perfection and order… She is the most skillful in executive faculty and the nearest to physical Nature… she presides over their detail of organization &amp; execution.",
      essence:"Die Jüngste der Vier und der physischen Natur am nächsten. Maheshwari legt die großen Linien, Mahakali treibt die Energie, Mahalakshmi findet den Rhythmus, und Mahasaraswati nimmt das Detail: das Ineinandergreifen der Teile, die Genauigkeit des Ergebnisses. Wissenschaft, Handwerk und Technik sind ihr Feld. Ihre Arbeit ist kleinteilig und kann der Ungeduld endlos scheinen, doch nichts wird übersprungen und nichts halb gelassen. Von den Vieren ist sie die Geduldigste mit menschlicher Unvollkommenheit, unter einer Bedingung: dass dein Wille einfach und gerade ist. Zwiespältigkeit duldet sie nicht, und ihre Ironie ist gnadenlos gegenüber der Pose.",
      imbalance:"Erde hält Form. Zu viel davon, und sie erstarrt: Feststecken, Tamas, der Körper, der sich nicht rührt. Zu wenig, und die Form zerfällt in ungesunde Gewohnheit und Essstörung, ein Leben ohne Rhythmus. Doch die feinste Fehlform auf der Karte ist zugleich die tiefste: Regeln folgen, auch wenn sie gegen die eigenen Werte gehen. Das ist Erdes eigene Gabe als Fälschung. Ihr ganzes Wesen ist rechter Prozess, und die Fälschung des rechten Prozesses ist bloße Prozedur: du behältst die Form und verlierst ihren Grund. Stress und Überladung ist dieselbe Fälschung, Arbeit als Gehäuse, in dem du sitzt, statt als etwas, das du tust.",
      tell:"Du kannst genau erklären, warum du etwas tust, das du nicht tun willst.",
      bridge:"Nichts auf dieser Karte ist psychologisch. Alles ist Körper: Essen, Schlaf, Atem, Bewegung, Meridiane, Kräuter, Tiere, Schütteln. Das ist kein Versehen. Mit Erdes Fehlform lässt sich nicht argumentieren, denn im Kopf wohnt sie nicht. Du verschiebst sie, indem du änderst, was deine Hände und Füße täglich tatsächlich tun.",
      shadow:["Feststecken","Tamasisch","Faulheit","Ungesundes Verhalten, Essstörung","Zu sehr im Vitalen","Gestresst, mit Arbeit überladen","Regeln folgen, auch gegen die eigenen Werte","Ohne Harmonie in dem, was du tust"],
      remedies:[
        {t:"Gesunde Gewohnheiten",d:"Ernährung, Sport, Yoga, Natur, Schlaf, Atem, Feng Shui, Ausmisten"},
        {t:"Klopfen, Akupunktur, Akupressur, Fußreflexzonen"},
        {t:"Feldenkrais, Massage"},
        {t:"Energiefluss",d:"Meridiane, Chakren (Hormon- und Nervensystem), chinesische Medizin, Lymphsystem"},
        {t:"Ayurveda"},
        {t:"Heilsteine"},
        {t:"Kräuter, Medizin aus der Natur"},
        {t:"Heilarbeit mit Tieren"},
        {t:"Lösen körperlicher Traumata",d:"zum Beispiel Schütteln"}
      ]
    }
  ],

  clEyebrow:"Praxis",
  clTitle:"Alle vier halten",
  cl:["Im November 1926 fragte ein Schüler Sri Aurobindo nach einer Kraft, die in ein Gefäß herabsteigt, das zu klein ist, um sie zu fassen. Seine Antwort war praktisch. Lass Mahasaraswati und Maheshwari wirken, sagte er; so habe er selbst gearbeitet. Viele könnten Mahakali nicht tragen, und nur wenige hielten sie unbeschadet aus.",
      "Alle vier müssen in uns harmonisiert werden. Der ideale Zustand, sagte er, sei, jenen Aspekt vorne zu haben, den die Handlung wirklich braucht, mit den drei anderen dahinter.",
      "Das Buch verlangt dreierlei von dem, der dies will: Bewusstsein, Plastizität und vorbehaltlose Hingabe. Und es sagt, dass jenseits der Vier eine weitere Gegenwart steht, die des Ananda, die nicht hervortreten kann, bevor die Vier ihre Harmonie gefunden haben."],

  glEyebrow:"Wörterbuch",
  glTitle:"Glossar",
  gl:[
    {t:"Shakti",d:"Die bewusste Kraft des Göttlichen: die Machtseite dessen, was die Sanskrit-Tradition das Göttliche nennt, weiblich angesprochen."},
    {t:"Mahashakti",d:"Die universale Mutter. Dieselbe Kraft, wie sie alle Welten erschafft, enthält und durch sie hindurch bewegt."},
    {t:"Supramental, Supermind",d:"Sri Aurobindos Begriff für ein Wahrheitsbewusstsein oberhalb des Denkens, das er für den nächsten Schritt der Evolution hielt und nicht für eine Flucht aus ihr."},
    {t:"Vital",d:"In seiner Sprache der lebenskräftige Teil des Menschen: Verlangen, Antrieb, Leidenschaft, Ehrgeiz. Kein Synonym für emotional."},
    {t:"Tamas, tamasisch",d:"Eine der drei Qualitäten der Natur: Trägheit, Dumpfheit, Schwere, Widerstand gegen Bewegung. Die anderen zwei sind Rajas, Antrieb, und Sattva, Klarheit."},
    {t:"Ananda",d:"Wonne, Seligkeit. In diesem System keine Stimmung, sondern ein Stoff des Daseins."},
    {t:"Psychisches Wesen",d:"Er nennt psychisch die Seele, den wachsenden göttlichen Funken hinter der Persönlichkeit. Mit übersinnlichen Kräften hat das nichts zu tun."},
    {t:"Matrimandir",d:"Die kugelförmige innere Kammer im Zentrum von Auroville, getragen von vier Säulenpaaren, die nach diesen vier Aspekten benannt sind."},
    {t:"EFT",d:"Emotional freedom techniques: Beklopfen von Akupressurpunkten mit den Fingerkuppen, während man eine Schwierigkeit im Sinn hält. Die Karte schreibt emotional efficiency therapy; üblich ist emotional freedom techniques."},
    {t:"Ho'oponopono",d:"Eine hawaiianische Praxis der Versöhnung und Vergebung, weithin bekannt in einer kurzen modernen Form aus vier Sätzen: Es tut mir leid, bitte vergib mir, danke, ich liebe dich."},
    {t:"Holotropes Atmen",d:"Beschleunigtes Atmen zu Musik, in den 1970er Jahren von Stanislav und Christina Grof entwickelt, um ohne Substanzen in außergewöhnliche Zustände zu gelangen."},
    {t:"Feldenkrais",d:"Eine von Moshé Feldenkrais entwickelte Bewegungsmethode, die gewohnte Muster durch langsame, aufmerksame Bewegung neu schult."},
    {t:"Tiefe Selbstbefragung",d:"Einen Glaubenssatz umdrehen und fragen, ob er wirklich wahr ist. The Work von Byron Katie und die Spiegelarbeit von Louise Hay sind die beiden auf der Karte genannten."},
    {t:"Bioresonanz",d:"Ein gerätegestütztes Verfahren, das beansprucht, elektromagnetische Frequenzen des Körpers zu lesen und zu korrigieren. Es hat keine anerkannte klinische Evidenzbasis."},
    {t:"Remote viewing",d:"Der Versuch, einen entfernten Ort oder Gegenstand ohne die Sinne wahrzunehmen. Von US-Geheimdienstprogrammen bis in die 1990er Jahre untersucht und ohne bestätigten Effekt eingestellt."},
    {t:"Russische Heiler",d:"Kurzform für die Linie um Grabovoi und Petrov, die Heilung durch strukturierte Visualisierung des Körpers in einem energetischen Feld lehrt. Es ist keine medizinische Methode."}
  ],
  glNote:"<b>Ein Wort zum Rest.</b> Heilige Kammer, kristalline Silberschnur, universelle Apotheke und Zeitlinien-Verschiebung gehören einzelnen Lehrlinien an und haben außerhalb von ihnen keine vereinbarte Definition. Wenn du sie in einer Gruppe verwendest, erkläre sie selbst, bevor du sie verwendest.",

  srcTitle:"Quellen",
  src:[
    "Sri Aurobindo, <em>The Mother</em>, 1928, Kapitel VI. Complete Works of Sri Aurobindo, Bd. 32.",
    "Kommentar der Mutter zu diesem Kapitel: drei Gespräche am 11., 18. und 25. August 1954. Collected Works of the Mother, Bd. 6.",
    "<em>Evening Talks with Sri Aurobindo</em>, 9. November 1926, über das Vorne- und Dahinterhalten der vier Aspekte.",
    "auroville.org, <em>The Mother's Symbol</em>, für ihre Erklärung und die Farbnotiz von 1934. matrimandir.org, für die vier Säulen und ihre Achsen.",
    "Die Elemente, die Schattenlisten und die Heilmittellisten: handgeschriebene Workshop-Karten, transkribiert. Sie sind eine heutige Lesart, über den Originaltext gelegt, und nicht Teil von ihm."
  ],
  sign:"Vier Kräfte · eine Mutter",
  homelink:"Start",
  flEyebrow:"Die Blumen der Mutter",
  flTitle:"Schönheit als Weg hindurch",
  mSig:"die Mutter",
  flIntro:["Die Mutter sagte, das Göttliche zeige sich in unserem Leben durch Schönheit, und sie gab über Jahrzehnte Blumen spirituelle Bedeutungen, indem sie, wie sie es nannte, mit der inneren Wahrheit jeder Blume in Kontakt trat. Sie benannte Hunderte. Darunter benannte sie Blumen für eben diese Aspekte, sodass die vier Kräfte je eine Blüte haben.",
    "Sri Aurobindo erklärte, dass Blumenbedeutungen in Ordnungen kommen: die eine zeigt eine seelische Eigenschaft wie Glauben oder Liebe, die andere zeigt die Aura oder das Wirken eines göttlichen Wesens. Die Aspekt-Blumen gehören zu dieser zweiten Ordnung. Sie sind die Kräfte, sichtbar gemacht, wachsend.",
    "Dies ist das sanfteste Heilmittel von allen, und frei. Sitz mit der Blume der Kraft, die dir fehlt. Finde sie wachsend, oder halte ein Bild, oder komm in die Blumengärten um das Matrimandir in Auroville, wo dies alles ein lebendiger Ort ist statt eines Schemas, und meditiere unter ihnen."],
  flowers:[
    {asp:"Ishwari · Luft", name:"Siris-Baum", latin:"Albizia lebbeck",
     sig:"Integrale Weisheit",
     text:"Für die Kraft, die das Ganze sieht. Wenn deine Last im Kopf liegt, Dogma und Grübeln und Ferne, ist die weite Ruhe der Weisheit das, wohin du zurückgreifst."},
    {asp:"Kali · Feuer", name:"Chinesischer Hibiskus", latin:"Hibiscus rosa-sinensis",
     sig:"Agni · dynamische, beherrschte Kraft",
     text:"Für das Feuer, das sein Ziel behalten hat. Agni ist die Flamme, die die Opfergabe trägt, ohne den zu verzehren, der sie darbringt. Kraft, die dient statt zu versengen."},
    {asp:"Lakshmi · Wasser", name:"Seerose", latin:"Nymphaea",
     sig:"Integraler Reichtum Mahalakshmis",
     text:"Für die Fülle des Herzens. Die Blume, die sich auf stillem Wasser öffnet, in der Tiefe verwurzelt und an der Oberfläche blühend. Schönheit und Harmonie zu einer einzigen Blüte geworden.",
     mother:null},
    {asp:"Saraswati · Erde", name:"Rondeletia", latin:"Rondeletia odorata",
     sig:"Mahasaraswatis Vollkommenheit im Werk",
     text:"Für das Handwerk, das sauber zu Ende bringt. Dies ist die Blume, die die Mutter für Saraswatis Vollkommenheit benannte, und ihr ganzer Kommentar dazu waren vier Worte.",
     mother:"Ist mit Behelfslösungen nicht zufrieden."}
  ],
  flNote:"<b>Ihre eigene Vorsicht.</b> Die Mutter war hierin sorgsam, wie es die meisten, die sie zitieren, nicht sind. Eine Blume, sagte sie, habe kein mentales Bewusstsein; ihr eine genaue Bedeutung zu geben, sei eine mentale Projektion, eine, der die Blume nachschwingen und die sie annehmen mag, doch eine Projektion gleichwohl. Zwei dieser vier benannte sie direkt. Zwei, Ishwaris und Kalis, haben wir nach dem Attribut zugeordnet und kennzeichnen sie als unsere Lesart, nicht ihr Wort."
},

hr:{
  htmlTitle:"Četiri moći Majke",
  mark:"Sri Aurobindo · Majka · 1928.",
  eyebrow:"Sri Aurobindo · Majka · Poglavlje VI",
  title:"Četiri moći<br><em>Majke</em>",
  lede:"Jedna sila, četiri lica. Poglavlje Sri Aurobinda iz 1928. postavljeno uz sjenu koju svaka moć baca i uz prakse koje toj sjeni izlaze u susret.",
  hint:"Dodirni laticu",
  attrs:"Mudrost · Snaga · Sklad · Savršenstvo",
  L:{element:"Element",pillar:"Matrimandir",attribute:"Svojstvo",shadow:"Sjena",
     remedies:"Lijekovi",attrib:"Sri Aurobindo · Majka · VI",orig:"Izvornik, engleski",balance:"Iscjeljenje neravnoteže",tellPrefix:"U tome si kad",toc:"Sadržaj"},
  dirs:{N:"Sjever",E:"Istok",S:"Jug",W:"Zapad"},

  ctxEyebrow:"Pozadina",
  ctxTitle:"Odakle ovo dolazi",
  ctx:[
    {h:"Žena",p:["Mirra Alfassa rođena je u Parizu 21. veljače 1878., kći majke iz Egipta i oca iz Turske, oboje iz sefardskih židovskih obitelji. Školovala se za slikaricu na Académie Julian i bila je ozbiljna glazbenica. Okultizam je studirala kod Maxa Théona u Tlemcenu u Alžiru, a u Parizu je vodila studijske grupe davno prije nego što je vidjela Indiju.","U Pondicherry je prvi put stigla 29. ožujka 1914. i srela Sri Aurobinda. Rat ju je opet odnio, uključujući četiri godine u Japanu; vratila se zauvijek 1920. Kad se Sri Aurobindo 24. studenoga 1926. povukao u osamu, preuzela je ašram koji se okupljao oko njega. Njegovu je školu otvorila 1943., a Auroville je inaugurirala 28. veljače 1968. Umrla je u Pondicherryju 17. studenoga 1973., u devedeset petoj godini."]},
    {h:"Knjiga",p:["Četiri moći opisane su u šestom poglavlju tanke knjige koju je Sri Aurobindo objavio 1928. i nazvao jednostavno <em>Majka</em>. Imenuje četiri vodeće Moći i Osobnosti kroz koje jedna Sila susreće svijet, daje im četiri svojstva i četiri imena, i uzima svaku redom.","Sama Majka komentirala je to poglavlje u tri razgovora u kolovozu 1954. Sve što je na ovoj stranici složeno serifnim pismom dolazi iz tog teksta."]},
    {h:"Simbol",p:["Njezino je objašnjenje bilo kratko. Središnji krug je Božanska Svijest. Četiri unutarnje latice su ove četiri moći. Dvanaest vanjskih latica su dvanaest moći koje ona očituje za svoj rad.","U ožujku 1934. Sri Aurobindo je odredio boje: središte i četiri moći bijeli, a dvanaest u tri stupnjevane skupine, crvena preko narančaste do žute, žuta preko zelene do plave, plava preko ljubičaste natrag do crvene. Ako bijela ne odgovara, središte može biti zlatno."]},
    {h:"Kompas",p:["Četiri para stupova koji nose Matrimandir u Auroville nose ova četiri imena i stoje na četiri osi: Maheshwari na jugu, Mahakali na sjeveru, Mahalakshmi na istoku, Mahasaraswati na zapadu. Latice gore leže na tim istim osima, i zato stranica počinje na sjeveru."]}
  ],

  aspects:[
    {
      name:"Maheshwari", element:"Zrak", dir:"S", attribute:"Mudrost",
      motto:"Mudrost · Znanje · Prostranstvo",
      quote:"Jer ona je moćna i mudra, ona koja nas otvara supramentalnim beskrajima i kozmičkom prostranstvu, veličanstvenosti vrhovnog Svjetla, riznici čudesnog znanja, nemjerljivom kretanju Majčinih vječnih sila. Spokojna je i čudesna, velika i zauvijek mirna. Ništa je ne može pomaknuti jer sva je mudrost u njoj…",
      quoteEn:"For she is the mighty and wise One who opens us to the supramental infinites &amp; cosmic vastness, to the grandeur of the supreme Light, to a treasure-house of miraculous knowledge, to the measureless movement of the Mother's eternal forces. Tranquil is she and wonderful, great and calm for ever. Nothing can move her because all wisdom is in her…",
      essence:"Sri Aurobindo smješta je u prostranstvo iznad mislećeg uma i volje. Ona postavlja velike linije svjetskih sila: vidi cjelinu i vidi kakva mora biti. Svakome pristupa prema njegovoj vlastitoj prirodi, mudrima daje veće svjetlo, slijepe vodi prema njihovoj sljepoći. Njezino suosjećanje nema kraja. I njezina su odbijanja tek odgoda, i njezine su kazne milost. No suosjećanje je nikada ne odvraća od istine neke stvari, a može djelovati previše mirno i previše daleko da bi je mala priroda dosegnula.",
      imbalance:"Zrak se diže i apstrahira. To je njegov dar i njegova zamka. Um dovoljno širok da obuhvati cijelu sliku, ako ga ništa ne zaustavi, izdvojit će jedan okvir i nazvati ga istinom. Odatle ide brzo: prostranstvo se sužava u stav, stav se stvrdne u uvjerenje, uvjerenje postaje dogma. Sve ostalo na kartici slijedi iz tog jednog poteza. Osuđuješ, jer čvrsta pozicija treba krivo da bi odredila svoje ispravno. Kritiziraš i postaješ ciničan kad se svijet odbija poklopiti. Previše razmišljaš, jer je misao sad jedini alat kojem vjeruješ. Suprotan smjer isti je element koji je zakazao drugačije: previše zraka i odlebdiš, odsječen, analizirajući život umjesto da stojiš u njemu.",
      tell:"Raspravljaš u glavi s nekim tko nije u sobi.",
      bridge:"Primijeti: nijedan od njih ne raspravlja s uvjerenjem. Svi rade uzvodno od njega i tretiraju uvjerenje kao nešto što se može prepisati, a ne kao nešto što jesi. Daljinsko gledanje i treće oko ista su sposobnost koja radi čisto: opažanje bez stiska.",
      shadow:["Uvjerenja","Dogma","Osuđivanje, ispravno ili krivo","Kritičnost","Cinizam","Uskogrudnost","Zaglavljenost u stavovima","Okrivljavanje","Pretjerano razmišljanje, paraliza analizom","Odvojenost, odsječenost","Previše u zraku, neuzemljenost","Manipulativnost"],
      remedies:[
        {t:"Svjesni stvaratelj",d:"iz programiranog automata u nacrt duše"},
        {t:"Imaginacija, ruski iscjelitelji",d:"rad u energetskom polju"},
        {t:"Pomaci vremenskih linija"},
        {t:"Stvaranje nove stvarnosti",d:"laserska zraka na platno, dugine boje, ti si redatelj"},
        {t:"Pražnjenje negativnih uvjerenja"},
        {t:"Univerzalna ljekarna",d:"iz trećeg oka"},
        {t:"Daljinsko gledanje, remote viewing"},
        {t:"Ulazak u najvišu verziju sebe"}
      ]
    },
    {
      name:"Mahakali", element:"Vatra", dir:"N", attribute:"Snaga",
      motto:"Preobrazba · Plemeniti ciljevi",
      quote:"U njoj je silovita intenzivnost, moćna strast sile da postigne, božansko nasilje koje nadire da razbije svaku granicu i svaku prepreku.",
      quoteEn:"There is in her an overwhelming intensity, a mighty passion of force to achieve, a divine violence rushing to shatter every limit and obstacle.",
      essence:"Ne prostranstvo nego visina, piše Sri Aurobindo; ne mudrost nego sila. Ona je brzina: izravan udarac, čeoni nalet koji nosi sve pred sobom. Ravnodušnost, nemar i tromost u radu ne podnosi i probudit će usnulog oštrom boli ako je to potrebno. Njezina je ljubav jednako žestoka kao i njezin gnjev. Bez nje bi ono što se učini u jednom danu moglo trajati stoljećima. No malo tko podnosi njezino djelovanje, i kad je učenik pitao koje aspekte držati sprijeda, Sri Aurobindo je imenovao druga dva.",
      imbalance:"Vatra proždire. Usmjerena na prepreku, čisti put; usmjerena na čovjeka, spaljuje ga. Svaka stavka na toj kartici jedan je isti pokret: sila koja je izgubila cilj. Bijes je sila bez smjera. Nadmoć je sila bez pristanka. Moje ili ništa je sila bez strpljenja. Velike geste s malo dubine su sila koja je postala predstava. Ispod svega sjedi ego, i to je prava pogreška: Kalina intenzivnost u punoj snazi, ali u službi malog ja umjesto djela. Crna magija samo je kraj tog puta, sila namjerno okrenuta protiv drugoga.",
      tell:"Važnije ti je da si u pravu nego ono što si htio postići.",
      bridge:"S vatrom se ne pregovara, i nijedan to ne pokušava. Svaki je ili posuda ili pražnjenje: ceremonija joj daje ognjište, disanje kontrolirano gorenje, zvuk i vibracija kanal, karmičko čišćenje nešto legitimno za proždrijeti. Nadilaženje ega je pravi lijek, jer ego je taj koji vatru krivo usmjeri.",
      shadow:["Bijes, ljutnja, nasilje, agresija","Zloupotreba moći, nadmoć","Destruktivno ponašanje","Moje ili ništa","Velike geste, malo dubine","Ego, veliko i malo ja","Tvrdo ponašanje","Crna magija"],
      remedies:[
        {t:"Ceremonija vatre"},

/* ═══════════════════════════════════════════════════════════
   SYMBOL — twelve outer petals in the 1934 colour sweep,
   four inner petals on the Matrimandir axes, white core.
   ═══════════════════════════════════════════════════════════ */

const OUTER_D = "M 0 -94 C -24 -121.3 -24 -156.4 0 -172 C 24 -156.4 24 -121.3 0 -94 Z";
const INNER_D = "M 0 -24 C -27 -46.4 -27 -75.2 0 -88 C 27 -75.2 27 -46.4 0 -24 Z";
const NS = "http://www.w3.org/2000/svg";

/* The positioning transform lives on the <path> attribute, never on the
   animated wrapper: a CSS transform would otherwise replace it outright
   and collapse every petal onto the origin while the bloom runs. */
(function buildSymbol(){
  const outer = document.getElementById('outer');
  for(let i=0;i<12;i++){
    const hue = i*30;
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','op');
    g.style.setProperty('--d', (i*0.045)+'s');
    const p = document.createElementNS(NS,'path');
    p.setAttribute('transform',`translate(200 200) rotate(${hue})`);
    p.setAttribute('d',OUTER_D);
    p.setAttribute('fill',`hsl(${hue}, 70%, 58%)`);
    p.setAttribute('fill-opacity','.16');
    p.setAttribute('stroke',`hsl(${hue}, 70%, 62%)`);
    p.setAttribute('stroke-opacity','.42');
    p.setAttribute('stroke-width','1');
    g.appendChild(p);
    outer.appendChild(g);
  }
  const inner = document.getElementById('inner');
  AXES.forEach((a,i)=>{
    const link = document.createElementNS(NS,'a');
    link.setAttribute('class','ip');
    link.setAttribute('href','#'+a.id);
    link.style.setProperty('--c',`var(${a.c})`);
    link.style.setProperty('--d',(0.62 + i*0.09)+'s');
    const title = document.createElementNS(NS,'title');
    title.textContent = a.id;
    const p = document.createElementNS(NS,'path');
    p.setAttribute('transform',`translate(200 200) rotate(${a.deg})`);
    p.setAttribute('d',INNER_D);
    link.appendChild(title); link.appendChild(p);
    inner.appendChild(link);
    link.addEventListener('pointerenter',()=>label(i));
    link.addEventListener('focus',()=>label(i));
    link.addEventListener('pointerleave',clearLabel);
    link.addEventListener('blur',clearLabel);
  });
})();

let LANG='en';
const hint = document.getElementById('hint');

function label(i){
  const a = T[LANG].aspects[i];
  hint.textContent = `${a.name} · ${a.element} · ${T[LANG].dirs[a.dir]}`;
  hint.style.setProperty('--hc',`var(${AXES[i].c})`);
  hint.classList.add('on');
}
function clearLabel(){
  hint.textContent = T[LANG].hint;
  hint.classList.remove('on');
}

  });

  document.querySelectorAll('.langs button').forEach(b=>
    b.setAttribute('aria-current', String(b.dataset.lang===lang)));
}

document.querySelectorAll('.langs button').forEach(b=>
  b.addEventListener('click',()=>render(b.dataset.lang)));

render('en');

/* The symbol now lives at the foot of the page, so the bloom waits until
   it is actually on screen. No observer support means show it outright,
   never leave it stranded at opacity 0. */
(function bloomOnView(){
  const svg = document.querySelector('.symbol');
  if (!svg) return;
  if (!('IntersectionObserver' in window)) { svg.classList.add('bloomed'); return; }
  const io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) { svg.classList.add('bloomed'); io.disconnect(); }
    });
  }, {threshold:0.2});
  io.observe(svg);
})();
</script>
</body>
