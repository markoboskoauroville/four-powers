<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practitioners · The Four Powers</title>
<style>
:root{
  --ink:#0B0E14; --sunk:#0D1117; --line:#212938; --line-soft:#181E29;
  --text:#E6E9F0; --muted:#8A93A6; --faint:#5C6478; --violet:#A78BFA;
  --pearl:#CBD5F5; --ember:#FF4D5E; --aqua:#35C9E8; --leaf:#6FD97C;
  --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
  --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  --col:min(680px,100% - 2.2rem);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.65;
  -webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 40rem at 50% -12rem,rgba(167,139,250,.10),transparent 70%)}
main,.topbar{position:relative;z-index:1}
.eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}
.topbar{display:flex;align-items:center;gap:1rem;padding:.8rem max(1.1rem,calc((100% - 680px)/2));
  border-bottom:1px solid var(--line-soft)}
.home{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;white-space:nowrap}
.home:hover{color:var(--violet)}
.home::before{content:'\2190 '}
.mark{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--faint);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.langs{display:flex;gap:.3rem}
.langs button{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;background:none;
  border:1px solid var(--line);color:var(--muted);padding:.28rem .5rem;border-radius:2px;cursor:pointer}
.langs button:hover{color:var(--text);border-color:var(--violet)}
.langs button[aria-current="true"]{color:var(--ink);background:var(--violet);border-color:var(--violet);font-weight:700}
.ver{font-family:var(--mono);font-size:.56rem;color:var(--faint)}
.wrap{width:var(--col);margin-inline:auto;padding-block:2.6rem 4rem}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,7vw,3rem);line-height:1.05;margin-block:.6rem .6rem}
.lede{color:var(--muted);margin-bottom:.6rem}

.pr{border:1px solid var(--line);border-radius:4px;background:var(--sunk);
  padding:1.6rem 1.5rem;margin-top:2rem}
.pr h2{font-family:var(--serif);font-weight:400;font-size:1.6rem;margin-bottom:.15rem}
.pr .role{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--violet);margin-bottom:.9rem}
.pr p{color:#C3CAD9;font-size:.94rem;margin-block:.6rem}
.pr .place{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:var(--faint);margin-top:.8rem}
.pr .links{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.1rem}
.pr .links a{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;color:var(--text);border:1px solid var(--line);border-radius:2px;padding:.5rem .9rem}
.pr .links a:hover{border-color:var(--violet);color:var(--violet)}

.sec{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--line-soft)}
.sec h3{font-family:var(--serif);font-weight:400;font-size:1.3rem;margin-bottom:.5rem}
.sec p{color:var(--muted);font-size:.92rem;margin-block:.5rem}
.mod{margin-top:1.2rem;border-left:2px solid var(--aqua);padding-left:1.1rem}
.mod b{display:block;font-family:var(--serif);font-size:1.05rem;color:var(--text)}
.mod p{font-size:.9rem;margin-top:.2rem}
.mod .links{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.7rem}
.mod .links a{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;color:var(--aqua);border:1px solid var(--line);border-radius:2px;padding:.45rem .8rem}
.mod .links a:hover{border-color:var(--aqua)}
.mod.leaf{border-color:var(--leaf)}
.mod.leaf b{color:var(--text)}
.mod.leaf .links a{color:var(--leaf)}
.note{margin-top:2rem;padding:1rem 1.1rem;background:var(--sunk);border:1px solid var(--line-soft);
  border-radius:3px;font-size:.85rem;color:var(--muted)}
.note b{color:var(--text)}
</style>
</head>
<body>
<header class="topbar">
  <a class="home" id="home" href="index.html"></a>
  <div class="mark" id="mark"></div>
  <nav class="langs" aria-label="Language">
    <button data-lang="en" aria-current="true">EN</button>
    <button data-lang="de" aria-current="false">DE</button>
    <button data-lang="hr" aria-current="false">HR</button>
  </nav>
  <span class="ver">v3 (a)</span>
</header>
<main><div class="wrap" id="wrap"></div></main>
<script>
const T={
 en:{
  home:"Home", mark:"The Four Powers", back:"Home",
  title:"Practitioners",
  lede:"People who work with this framework in their practice. If a reading has shown you where your load sits, these are the hands that help carry it.",
  people:[{
   name:"Kerstin Brandmayr", role:"Spiritual guide for women · Austria",
   bio:["A trained agricultural educator and education manager who turned toward spiritual work for women, so that the feeling side of her could come into play. She guides women and mothers, online and in person, back to their own centre and the most powerful version of themselves.",
        "Her work runs through the body and the earth: embodiment, arriving fully in the body, the strong woman who has shed her fetters. She offers one-to-one guidance, women's circles, retreats across Europe, and Erdweib, a ten-month training for women who want to lead from that depth. Sessions online or at Holzhausen, Upper Austria."],
   place:"Holzhausen, Oberösterreich · online across Europe",
   links:[["seelenorgasmus.at","https://www.seelenorgasmus.at"],["Linktree","https://linktr.ee/kerstinbrandmayr"]]
  }],
  modH:"Modalities", modLede:"Approaches this framework draws on. Neither is required, and neither is sold here. A reading is free and the flowers cost nothing. These are for when you want to go further with someone trained.",
  mods:[
   {cls:"", b:"Aura-Soma", p:"A colour system of Equilibrium bottles. Its own first principle is that you choose the bottle, not a test: you are the colours you choose, and no one knows better than you what you need. So go and let the colours choose you, rather than arriving with an answer.",
    links:[["aura-soma.com","https://aura-soma.com"],["Find a practitioner","https://aura-soma-academy.com"]]},
   {cls:"leaf", b:"The Mother's flowers", p:"Free, and the deepest of the three. The Mother gave spiritual significances to flowers, naming two for these very aspects: the water lily for Lakshmi's wealth, Rondeletia for Saraswati's perfection in works. Sit with a picture, find them growing, or come to the Matrimandir gardens in Auroville and meditate among them.",
    links:[["Matrimandir","https://auroville.org/page/matrimandir"],["The flowers","https://www.motherandsriaurobindo.in"]]}
  ],
  note:"<b>On this list.</b> Inclusion means a person or approach genuinely works with these four powers, nothing more. A reading never sends you to anyone or anything. What it finds, it finds freely, and what to do with it is yours."
 },
 de:{
  home:"Start", mark:"Die vier Kräfte", back:"Start",
  title:"Begleiterinnen",
  lede:"Menschen, die mit diesem Rahmen in ihrer Praxis arbeiten. Wenn eine Lesung dir gezeigt hat, wo deine Last liegt, sind dies die Hände, die tragen helfen.",
  people:[{
   name:"Kerstin Brandmayr", role:"Spirituelle Frauenbegleiterin · Österreich",
   bio:["Studierte Agrarpädagogin und Bildungsmanagerin, umgesattelt zur spirituellen Frauenbegleiterin, um die fühlenden Seiten in ihr zum Einsatz kommen zu lassen. Sie begleitet Frauen und Mütter, online und vor Ort, zurück in ihre Mitte und in die kraftvollste Version ihrer selbst.",
        "Ihre Arbeit läuft durch den Körper und die Erde: Verkörperung, ein tiefes Ankommen im Körper, die starke Frau, die ihre Fesseln abgelegt hat. Sie bietet Einzelbegleitung, Frauenkreise, Retreats in ganz Europa und Erdweib, eine zehnmonatige Ausbildung für Frauen, die aus dieser Tiefe führen wollen. Sessions online oder in Holzhausen, Oberösterreich."],
   place:"Holzhausen, Oberösterreich · online in ganz Europa",
   links:[["seelenorgasmus.at","https://www.seelenorgasmus.at"],["Linktree","https://linktr.ee/kerstinbrandmayr"]]
  }],
  modH:"Modalitäten", modLede:"Ansätze, aus denen dieser Rahmen schöpft. Keiner ist nötig, keiner wird hier verkauft. Eine Lesung ist frei und die Blumen kosten nichts. Diese sind für den Moment, in dem du mit jemand Ausgebildetem weitergehen willst.",
  mods:[
   {cls:"", b:"Aura-Soma", p:"Ein Farbsystem aus Equilibrium-Flaschen. Sein eigenes erstes Prinzip ist, dass du die Flasche wählst, nicht ein Test: du bist die Farben, die du wählst, und niemand weiß besser als du, was du brauchst. Geh also und lass die Farben dich wählen, statt mit einer Antwort anzukommen.",
    links:[["aura-soma.com","https://aura-soma.com"],["Begleiterin finden","https://aura-soma-academy.com"]]},
   {cls:"leaf", b:"Die Blumen der Mutter", p:"Frei, und das tiefste der drei. Die Mutter gab Blumen spirituelle Bedeutungen und benannte zwei nach eben diesen Aspekten: die Seerose für Lakshmis Reichtum, Rondeletia für Saraswatis Vollkommenheit im Werk. Sitz mit einem Bild, finde sie wachsend, oder komm in die Matrimandir-Gärten in Auroville und meditiere unter ihnen.",
    links:[["Matrimandir","https://auroville.org/page/matrimandir"],["Die Blumen","https://www.motherandsriaurobindo.in"]]}
  ],
  note:"<b>Zu dieser Liste.</b> Aufnahme bedeutet, dass ein Mensch oder Ansatz wirklich mit diesen vier Kräften arbeitet, mehr nicht. Eine Lesung schickt dich nie zu jemandem oder etwas. Was sie findet, findet sie frei, und was du damit tust, gehört dir."
 },
 hr:{
  home:"Početak", mark:"Četiri moći", back:"Početak",
  title:"Voditelji",
  lede:"Ljudi koji s ovim okvirom rade u svojoj praksi. Ako ti je očitanje pokazalo gdje ti leži teret, ovo su ruke koje pomažu nositi.",
  people:[{
   name:"Kerstin Brandmayr", role:"Duhovna voditeljica za žene · Austrija",
   bio:["Školovana agrarna pedagoginja i menadžerica obrazovanja, prešla na duhovno vođenje žena kako bi osjećajne strane u njoj došle do izražaja. Vodi žene i majke, online i uživo, natrag u vlastito središte i u najmoćniju verziju sebe.",
        "Njezin rad teče kroz tijelo i zemlju: utjelovljenje, duboko dolaženje u tijelo, snažna žena koja je zbacila okove. Nudi individualno vođenje, ženske krugove, retreate diljem Europe i Erdweib, desetomjesečnu izobrazbu za žene koje žele voditi iz te dubine. Sesije online ili u Holzhausenu, Gornja Austrija."],
   place:"Holzhausen, Gornja Austrija · online diljem Europe",
   links:[["seelenorgasmus.at","https://www.seelenorgasmus.at"],["Linktree","https://linktr.ee/kerstinbrandmayr"]]
  }],
  modH:"Modaliteti", modLede:"Pristupi iz kojih ovaj okvir crpi. Nijedan nije nužan i nijedan se ovdje ne prodaje. Očitanje je slobodno, a cvijeće ne košta ništa. Ovo je za trenutak kad želiš poći dalje s nekim obučenim.",
  mods:[
   {cls:"", b:"Aura-Soma", p:"Sustav boja od Equilibrium bočica. Njihovo je vlastito prvo načelo da bočicu biraš ti, a ne test: ti si boje koje biraš, i nitko ne zna bolje od tebe što ti treba. Zato idi i pusti da boje izaberu tebe, umjesto da stigneš s odgovorom.",
    links:[["aura-soma.com","https://aura-soma.com"],["Nađi voditelja","https://aura-soma-academy.com"]]},
   {cls:"leaf", b:"Majčino cvijeće", p:"Slobodno, i najdublje od tri. Majka je cvijeću dala duhovna značenja, imenovavši dva po upravo ovim aspektima: lopoč za Lakshmino bogatstvo, Rondeletiju za Saraswatino savršenstvo u radu. Sjedni sa slikom, nađi ih kako rastu, ili dođi u vrtove Matrimandira u Auroville i meditiraj među njima.",
    links:[["Matrimandir","https://auroville.org/page/matrimandir"],["Cvijeće","https://www.motherandsriaurobindo.in"]]}
  ],
  note:"<b>O ovom popisu.</b> Uvrštenje znači da osoba ili pristup uistinu rade s ove četiri moći, ništa više. Očitanje te nikad ne šalje nikome niti ičemu. Što nađe, nađe slobodno, a što ćeš s tim, tvoje je."
 }
};
const $=id=>document.getElementById(id);
function render(l){
 const t=T[l];
 document.documentElement.lang=l;document.title=t.title+" · "+t.mark;
 $('home').textContent=t.back;$('mark').textContent=t.mark;
 $('wrap').innerHTML=
  `<p class="eyebrow">${t.mark}</p><h1>${t.title}</h1><p class="lede">${t.lede}</p>`+
  t.people.map(p=>
   `<div class="pr"><h2>${p.name}</h2><div class="role">${p.role}</div>
     ${p.bio.map(b=>`<p>${b}</p>`).join('')}
     <div class="place">${p.place}</div>
     <div class="links">${p.links.map(([n,h])=>`<a href="${h}" target="_blank" rel="noopener">${n}</a>`).join('')}</div>
    </div>`).join('')+
  `<div class="sec"><h3>${t.modH}</h3><p>${t.modLede}</p>`+
  t.mods.map(m=>
   `<div class="mod ${m.cls}"><b>${m.b}</b><p>${m.p}</p>
     <div class="links">${m.links.map(([n,h])=>`<a href="${h}" target="_blank" rel="noopener">${n}</a>`).join('')}</div>
    </div>`).join('')+
  `<p class="note">${t.note}</p></div>`;
 document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-current',String(b.dataset.lang===l)));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.lang)));
/* ── language persistence (first-party cookie, no banner needed) ── */
(function(){
  var KEY='fp_lang', VALID={en:1,de:1,hr:1};
  function read(){
    var m=document.cookie.match(/(?:^|; )fp_lang=([^;]*)/);
    var v=m?decodeURIComponent(m[1]):null; return VALID[v]?v:null;
  }
  function write(l){
    var d=new Date(); d.setTime(d.getTime()+31536000000); // 1 year
    document.cookie=KEY+'='+l+'; expires='+d.toUTCString()+'; path=/; SameSite=Lax';
  }
  var _apply=render;
  render=function(l){ if(VALID[l]) write(l); return _apply(l); };
  render(read()||'en');
})();
</script>
</body>
</html>
