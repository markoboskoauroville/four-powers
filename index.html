<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Four Powers</title>
<style>
:root{
  --ink:#0B0E14; --surface:#10141C; --sunk:#0D1117;
  --line:#212938; --line-soft:#181E29;
  --text:#E6E9F0; --muted:#8A93A6; --faint:#5C6478;
  --violet:#A78BFA;
  --pearl:#CBD5F5; --ember:#FF4D5E; --aqua:#35C9E8; --leaf:#6FD97C;
  --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
  --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  --col:min(680px,100% - 2.2rem);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink);color:var(--text);font-family:var(--sans);
  font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(60rem 44rem at 50% -8rem,rgba(167,139,250,.12),transparent 70%);
}
main,.topbar{position:relative;z-index:1}
.eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}

.topbar{display:flex;align-items:center;gap:1rem;
  padding:.8rem max(1.1rem,calc((100% - 680px)/2));border-bottom:1px solid var(--line-soft)}
.mark{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--faint);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.langs{display:flex;gap:.3rem}
.langs button{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;background:none;
  border:1px solid var(--line);color:var(--muted);padding:.28rem .5rem;border-radius:2px;cursor:pointer}
.langs button:hover{color:var(--text);border-color:var(--violet)}
.langs button[aria-current="true"]{color:var(--ink);background:var(--violet);border-color:var(--violet);font-weight:700}
.ver{font-family:var(--mono);font-size:.56rem;color:var(--faint)}

.wrap{width:var(--col);margin-inline:auto}

/* hero */
.hero{width:var(--col);margin:4rem auto 0;text-align:center}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(2.6rem,10vw,4.6rem);
  line-height:1.0;letter-spacing:-.02em;margin-block:.7rem .5rem}
.hero h1 em{font-style:normal;color:var(--violet)}
.tag{font-family:var(--mono);font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
.lede{color:var(--muted);max-width:34rem;margin:1.6rem auto 0;font-size:1.05rem}

/* symbol */
.symbol{margin:2.6rem auto 0;max-width:min(300px,72vw);display:block}
.op{transform-origin:200px 200px}
.ip path{fill:var(--pearl);fill-opacity:.10;stroke:var(--pearl);stroke-opacity:.5;stroke-width:1.1}
.core{fill:var(--pearl);fill-opacity:.9;transform-origin:200px 200px;
  filter:drop-shadow(0 0 12px rgba(203,213,245,.55))}

/* doors */
.doors{width:var(--col);margin:3.5rem auto 0;display:grid;gap:1rem}
@media(min-width:600px){.doors{grid-template-columns:1fr 1fr}}
.door{
  display:flex;flex-direction:column;text-decoration:none;color:var(--text);
  background:var(--sunk);border:1px solid var(--line);border-radius:4px;
  padding:1.6rem 1.5rem 1.5rem;transition:border-color .2s,transform .2s;
}
.door:hover{border-color:var(--violet);transform:translateY(-2px)}
.door.primary{border-color:rgba(167,139,250,.4)}
.door .k{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--violet)}
.door h2{font-family:var(--serif);font-weight:400;font-size:1.7rem;margin:.5rem 0 .5rem}
.door p{color:var(--muted);font-size:.92rem;line-height:1.55;flex:1}
.door .go{margin-top:1.1rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:.4rem}
.door:hover .go{color:var(--violet)}
.door .go::after{content:'\2192'}

/* minor nav */
.minor{width:var(--col);margin:2.2rem auto 0;display:flex;gap:.4rem 1.6rem;flex-wrap:wrap;
  justify-content:center;padding-top:1.8rem;border-top:1px solid var(--line-soft)}
.minor a{font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);text-decoration:none}
.minor a:hover{color:var(--violet)}

.footer{width:var(--col);margin:3.5rem auto 0;padding-block:2.5rem 3.5rem;
  border-top:1px solid var(--line-soft);text-align:center}
.footer p{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:var(--faint);line-height:1.7}

@keyframes bloom{from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
.op,.ip,.core{animation:bloom .8s cubic-bezier(.2,.8,.3,1) backwards;animation-delay:var(--d,0s)}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.op,.ip,.core{animation:none}*{transition-duration:.01ms!important}}
</style>
</head>
<body>

<header class="topbar">
  <div class="mark" id="mark"></div>
  <nav class="langs" aria-label="Language">
    <button data-lang="en" aria-current="true">EN</button>
    <button data-lang="de" aria-current="false">DE</button>
    <button data-lang="hr" aria-current="false">HR</button>
  </nav>
  <span class="ver">v1 (a)</span>
</header>

<main>
  <section class="hero">
    <p class="tag" id="tag"></p>
    <h1 id="title"></h1>
    <svg class="symbol" viewBox="0 0 400 400" role="img" aria-labelledby="st">
      <title id="st">The Mother's symbol</title>
      <g id="outer"></g><g id="inner"></g>
      <circle class="core" cx="200" cy="200" r="20" style="--d:1.55s"></circle>
    </svg>
    <p class="lede" id="lede"></p>
  </section>

  <nav class="doors" id="doors" aria-label="Main"></nav>
  <nav class="minor" id="minor"></nav>

  <footer class="footer"><p id="foot"></p></footer>
</main>

<script>
const AXES=[
  {c:'--pearl',deg:180},{c:'--ember',deg:0},{c:'--aqua',deg:90},{c:'--leaf',deg:270}
];
const T={
 en:{
  mark:"The Four Powers",
  tag:"Sri Aurobindo · The Mother",
  title:"The Four<br><em>Powers</em>",
  lede:"One force, four faces. A way of reading where a person stands, and what would bring them back to balance. Drawn from Sri Aurobindo, and from the older systems he himself drew on.",
  doors:[
   {k:"Start here",h:"The Reading",p:"Forty questions, about eight minutes. It reads each of your four powers twice, as your nature and as the load it carries now, then shows what would move it.",go:"Begin the reading",href:"reading.html",primary:true},
   {k:"Behind it",h:"The Synthesis",p:"Where this comes from. The four powers, the shadow each casts, and how Ayurveda, Chinese medicine and Jung are woven into one integral reading.",go:"Read the principles",href:"synthesis.html"}
  ],
  minor:[["About the authors","about.html"],["Practitioners","practitioners.html"]],
  foot:"A space to think, freely given.<br>Nothing you enter leaves your device."
 },
 de:{
  mark:"Die vier Kräfte",
  tag:"Sri Aurobindo · Die Mutter",
  title:"Die vier<br><em>Kräfte</em>",
  lede:"Eine Kraft, vier Gesichter. Eine Weise zu lesen, wo ein Mensch steht, und was ihn ins Gleichgewicht zurückbrächte. Aus Sri Aurobindo, und aus den älteren Systemen, aus denen er selbst schöpfte.",
  doors:[
   {k:"Hier beginnen",h:"Die Lesung",p:"Vierzig Fragen, etwa acht Minuten. Jede deiner vier Kräfte wird zweimal gelesen, als deine Natur und als die Last, die sie gerade trägt, dann zeigt sich, was sie bewegen würde.",go:"Die Lesung beginnen",href:"reading.html",primary:true},
   {k:"Dahinter",h:"Die Synthese",p:"Woher das kommt. Die vier Kräfte, der Schatten, den jede wirft, und wie Ayurveda, chinesische Medizin und Jung zu einer ganzheitlichen Lesung verwoben sind.",go:"Die Prinzipien lesen",href:"synthesis.html"}
  ],
  minor:[["Über die Autoren","about.html"],["Begleiterinnen","practitioners.html"]],
  foot:"Ein Raum zum Denken, frei gegeben.<br>Nichts, was du eingibst, verlässt dein Gerät."
 },
 hr:{
  mark:"Četiri moći",
  tag:"Sri Aurobindo · Majka",
  title:"Četiri<br><em>moći</em>",
  lede:"Jedna sila, četiri lica. Način da se očita gdje čovjek stoji i što bi ga vratilo u ravnotežu. Iz Sri Aurobinda, i iz starijih sustava iz kojih je i sam crpio.",
  doors:[
   {k:"Počni ovdje",h:"Očitanje",p:"Četrdeset pitanja, otprilike osam minuta. Svaka se od tvoje četiri moći čita dvaput, kao tvoja narav i kao teret koji sada nosi, zatim se pokaže što bi to pomaknulo.",go:"Započni očitanje",href:"reading.html",primary:true},
   {k:"Iza toga",h:"Sinteza",p:"Odakle ovo dolazi. Četiri moći, sjena koju svaka baca, i kako su ayurveda, kineska medicina i Jung utkani u jedno cjelovito očitanje.",go:"Pročitaj načela",href:"synthesis.html"}
  ],
  minor:[["O autorima","about.html"],["Voditelji","practitioners.html"]],
  foot:"Prostor za misao, slobodno darovan.<br>Ništa što upišeš ne napušta tvoj uređaj."
 }
};

const NS="http://www.w3.org/2000/svg";
const OUTER="M 0 -94 C -24 -121.3 -24 -156.4 0 -172 C 24 -156.4 24 -121.3 0 -94 Z";
const INNER="M 0 -24 C -27 -46.4 -27 -75.2 0 -88 C 27 -75.2 27 -46.4 0 -24 Z";
(function(){
 const o=document.getElementById('outer');
 for(let i=0;i<12;i++){const h=i*30;const g=document.createElementNS(NS,'g');g.setAttribute('class','op');
  g.style.setProperty('--d',(i*0.045)+'s');const p=document.createElementNS(NS,'path');
  p.setAttribute('transform',`translate(200 200) rotate(${h})`);p.setAttribute('d',OUTER);
  p.setAttribute('fill',`hsl(${h}, 70%, 58%)`);p.setAttribute('fill-opacity','.16');
  p.setAttribute('stroke',`hsl(${h}, 70%, 62%)`);p.setAttribute('stroke-opacity','.42');p.setAttribute('stroke-width','1');
  g.appendChild(p);o.appendChild(g);}
 const inr=document.getElementById('inner');
 AXES.forEach((a,i)=>{const g=document.createElementNS(NS,'g');g.setAttribute('class','ip');
  g.style.setProperty('--d',(0.62+i*0.09)+'s');const p=document.createElementNS(NS,'path');
  p.setAttribute('transform',`translate(200 200) rotate(${a.deg})`);p.setAttribute('d',INNER);
  p.style.fill=`var(${a.c})`;p.style.fillOpacity='.5';p.style.stroke=`var(${a.c})`;p.style.strokeOpacity='.85';
  g.appendChild(p);inr.appendChild(g);});
})();

const $=id=>document.getElementById(id);
function render(l){
 const t=T[l];
 document.documentElement.lang=l;document.title=t.mark;
 $('mark').textContent=t.mark;$('tag').textContent=t.tag;
 $('title').innerHTML=t.title;$('lede').textContent=t.lede;
 $('doors').innerHTML=t.doors.map(d=>
  `<a class="door${d.primary?' primary':''}" href="${d.href}">
     <span class="k">${d.k}</span><h2>${d.h}</h2><p>${d.p}</p>
     <span class="go">${d.go}</span></a>`).join('');
 $('minor').innerHTML=t.minor.map(([lbl,href])=>`<a href="${href}">${lbl}</a>`).join('');
 $('foot').innerHTML=t.foot;
 document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-current',String(b.dataset.lang===l)));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.lang)));
render('en');
</script>
</body>
</html>
